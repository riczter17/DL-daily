// === v4.16.0: open up self-directed time + relocate meditation into wind-down ===
// Transforms a template (by block label, not key, so it works across all template ids):
//  - Self-directed blocks (Self-time/Hobby, Leisure/hobby, Reading, Personal project) -> empty open slot
//  - Weekday-evening Wife time (start >= 19:00) -> empty open slot (Saturday morning Wife time is kept)
//  - Existing Meditation blocks removed; meditation re-added as the last 15 min of Wind down (no sleep change)
//  - Adjacent empty slots merged into one
function migrateTpl416(tpl){
  if(!tpl||!tpl.length)return tpl;
  var SELF=["Self-time / Hobby","Leisure / hobby","Reading","Personal project"];
  var out=tpl.map(function(b){
    if(SELF.indexOf(b.label)>=0)return{s:b.s,e:b.e,label:"",cat:"personal"};
    if(b.label==="Wife time"&&b.s>=1140)return{s:b.s,e:b.e,label:"",cat:"personal"};
    if(b.label==="Meditation")return{s:b.s,e:b.e,label:"",cat:"personal"};
    return{s:b.s,e:b.e,label:b.label,cat:b.cat};
  });
  for(var i=0;i<out.length;i++){
    if(out[i].label==="Wind down"){
      var wd=out[i];
      if(wd.e-wd.s>15){out[i]={s:wd.s,e:wd.e-15,label:"Wind down",cat:"personal"};out.splice(i+1,0,{s:wd.e-15,e:wd.e,label:"Meditation",cat:"health"});}
      else{out[i]={s:wd.s,e:wd.e,label:"Meditation",cat:"health"};}
      break;
    }
  }
  out.sort(function(a,b){return a.s-b.s});
  var merged=[];
  out.forEach(function(b){
    var last=merged[merged.length-1];
    if(last&&last.label===""&&b.label===""&&last.e===b.s){last.e=b.e;}
    else merged.push(b);
  });
  return merged;
}

function rLogin(){
  var h='<div class="hdr"><div style="font-size:40px;margin-bottom:6px">\u{1F510}</div><h1>Daily OS</h1><p>Sign in to continue</p></div>';
  h+='<div class="card">';

    h+='<label class="lbl">6-digit Code</label>';

async function sendLoginCode(){
  var email=document.getElementById('loginEmail').value.trim();
  var msgEl=document.getElementById('loginMsg');
  if(!email){msgEl.textContent='Enter your email first.';msgEl.style.color='var(--red)';return}
  msgEl.textContent='Sending...';
  msgEl.style.color='var(--mut)';
  try{
    var result=await db.auth.signInWithOtp({email:email,options:{shouldCreateUser:false}});
    if(result.error)throw result.error;
    loginEmail=email;
    loginStep='code';
    R();
  }catch(err){
    msgEl.textContent='Error: '+err.message;
    msgEl.style.color='var(--red)';
  }
}

async function verifyLoginCode(){
  var code=document.getElementById('loginCode').value.trim();
  var msgEl=document.getElementById('loginMsg');
  if(!code||code.length!==6){msgEl.textContent='Enter the 6-digit code.';msgEl.style.color='var(--red)';return}
  msgEl.textContent='Verifying...';
  msgEl.style.color='var(--mut)';
  try{
    var result=await db.auth.verifyOtp({email:loginEmail,token:code,type:'email'});
    if(result.error)throw result.error;
    // onAuthStateChange will handle the SIGNED_IN event and trigger app load
    msgEl.textContent='Success!';
    msgEl.style.color='var(--grn)';
  }catch(err){
    msgEl.textContent='Error: '+err.message;
    msgEl.style.color='var(--red)';
  }
}

async function doSignOut(){
  if(!confirm("Sign out of Daily OS? You will need to sign in again with a code."))return;
  try{
    // Unsubscribe from realtime
    if(realtimeChannel){await db.removeChannel(realtimeChannel);realtimeChannel=null}
    // Clear local cache
    try{localStorage.removeItem(KS)}catch(e){}
    try{localStorage.removeItem(MEAL_KS)}catch(e){}
    // Sign out of Supabase
    await db.auth.signOut();
    // Reset login state
    loginStep='email';
    loginEmail='';
    authUser=null;
    // Reload to clean state
    location.reload();
  }catch(err){
    alert('Sign out failed: '+err.message);
  }
}

function rSummary(){
  var today=todayStr();
  var h='<div class="nav"><button class="bk" onclick="view=\'home\';R()">\u{2190} Back</button><span class="nav-t">Weekly Summary</span><span style="width:40px"></span></div>';
  var days7=[];for(var i=6;i>=0;i--){var dt=addDays(today,-i);var dy=getDay(dt);if(dy&&dy.blocks.length>0)days7.push({date:dt,day:dy})}
  if(days7.length===0){h+='<div class="card"><p style="color:var(--dim)">No data for the past 7 days.</p></div>';$.innerHTML=h;return}

  // Collect all blocks
  var allBlks=[];days7.forEach(function(d){d.day.blocks.forEach(function(b){allBlks.push(b)})});
  var plannedBlks=allBlks.filter(function(b){return b.status==='planned'});
  var unplannedBlks=allBlks.filter(function(b){return b.status==='unplanned'});
  var skippedBlks=allBlks.filter(function(b){return b.status==='skipped'});
  var doneBlks=plannedBlks.concat(unplannedBlks);

  var plannedMins=plannedBlks.reduce(function(s,b){return s+(b.e-b.s)},0);
  var unplannedMins=unplannedBlks.reduce(function(s,b){return s+(b.e-b.s)},0);
  var skippedMins=skippedBlks.reduce(function(s,b){return s+(b.e-b.s)},0);
  var doneMins=plannedMins+unplannedMins;

  // Headline metrics
  var adherence=plannedMins+skippedMins>0?Math.round(plannedMins/(plannedMins+skippedMins)*100):100;
  var disruption=doneMins>0?Math.round(unplannedMins/doneMins*100):0;

  h+='<div class="card"><h3 style="font-size:15px;font-weight:700;color:var(--wht);margin-bottom:12px">\u{1F3AF} Key Metrics</h3>';
  h+='<div class="srow"><span>Adherence rate</span><span style="font-weight:700;color:'+(adherence>=70?'var(--grn)':'var(--red)')+'">'+adherence+'%</span></div>';
  h+='<div style="font-size:11px;color:var(--dim);margin-bottom:8px">Planned done / (Planned done + Skipped)</div>';
  h+='<div class="srow"><span>Disruption load</span><span style="font-weight:700;color:'+(disruption<=35?'var(--grn)':'var(--acc)')+'">'+disruption+'%</span></div>';
  h+='<div style="font-size:11px;color:var(--dim);margin-bottom:8px">Unplanned / all done hours</div>';
  h+='<div class="srow"><span>Planned</span><span style="font-weight:700;color:var(--grn)">'+(plannedMins/60).toFixed(1)+'h</span></div>';
  h+='<div class="srow"><span>Unplanned</span><span style="font-weight:700;color:var(--acc)">'+(unplannedMins/60).toFixed(1)+'h</span></div>';
  h+='<div class="srow"><span>Skipped</span><span style="font-weight:700;color:var(--red)">'+(skippedMins/60).toFixed(1)+'h</span></div>';
  h+='</div>';

  // Morning Energy card
  var meVals=days7.filter(function(d){return d.day.morningEnergy}).map(function(d){return d.day.morningEnergy});
  h+='<div class="card"><h3 style="font-size:15px;font-weight:700;color:var(--wht);margin-bottom:12px">\u{2600}\u{FE0F} Morning Energy (7 days)</h3>';
  if(!meVals.length){
    h+='<p style="font-size:13px;color:var(--dim)">No morning energy logged yet. Log it first thing each day to track sleep recovery.</p>';
  } else {
    var meAvg=meVals.reduce(function(a,b){return a+b},0)/meVals.length;
    var meAbove3=meVals.filter(function(v){return v>=3}).length;
    h+='<div class="srow"><span>Average</span><span style="font-weight:700;color:'+(meAvg>=3?'var(--grn)':'var(--red)')+'">'+meAvg.toFixed(1)+'/5</span></div>';
    h+='<div class="srow"><span>Days logged</span><span style="font-weight:700">'+meVals.length+'/7</span></div>';
    h+='<div class="srow"><span>Days at 3 or above</span><span style="font-weight:700;color:var(--grn)">'+meAbove3+'</span></div>';
    h+='<div style="display:flex;gap:4px;margin-top:10px">';
    for(var mi=6;mi>=0;mi--){
      var mdt=addDays(today,-mi);var mdy=getDay(mdt);var mv=mdy&&mdy.morningEnergy;
      var mbg=mv?(mv>=4?'var(--grn)':mv>=3?'var(--acc)':'var(--red)'):'var(--bdr)';
      h+='<div style="flex:1;padding:6px 0;border-radius:4px;text-align:center;font-size:12px;font-weight:700;background:'+mbg+';color:'+(mv?'#0f1117':'var(--dim)')+'">'+(mv||'-')+'</div>';
    }
    h+='</div>';
  }
  h+='</div>';

  // Checklist streaks
  h+='<div class="card"><h3 style="font-size:15px;font-weight:700;color:var(--wht);margin-bottom:12px">\u{2705} Habit Streaks (7 days)</h3>';
  data.checklist.forEach(function(c){
    var hits=0;
    h+='<div style="margin-bottom:10px"><div style="font-size:13px;font-weight:600;margin-bottom:4px">'+c.l+'</div><div class="streak">';
    for(var i=6;i>=0;i--){
      var dt=addDays(today,-i);var dy=getDay(dt);
      var on=dy&&dy.checklist&&dy.checklist[c.id];
      if(on)hits++;
      h+='<div class="streak-d" style="background:'+(on?'var(--grn)':'var(--bdr)')+';color:'+(on?'#0f1117':'var(--dim)')+'">'+(on?'\u{2713}':'')+'</div>';
    }
    h+='<span style="font-size:12px;color:var(--dim);margin-left:6px">'+hits+'/7</span></div></div>';
  });
  h+='</div>';

  // Time by category (done blocks only)
  var catMins={};CATS.forEach(function(c){catMins[c.id]=0});
  doneBlks.forEach(function(b){if(!b.label||!b.cat)return;var dur=b.e-b.s;catMins[b.cat]=(catMins[b.cat]||0)+dur});
  var sortedCats=Object.keys(catMins).filter(function(k){return catMins[k]>0}).sort(function(a,b){return catMins[b]-catMins[a]});
  var maxCat=sortedCats.length?catMins[sortedCats[0]]:1;
  h+='<div class="card"><h3 style="font-size:15px;font-weight:700;color:var(--wht);margin-bottom:12px">\u{1F4CA} Time by Category (done only)</h3>';
  sortedCats.forEach(function(catId){
    var cat=gC(catId);var mins=catMins[catId];
    h+='<div class="sbar"><span class="sbar-l">'+cat.e+' '+cat.l+'</span><div class="sbar-t"><div class="sbar-f" style="width:'+Math.round(mins/maxCat*100)+'%;background:'+cat.c+'"></div></div><span class="sbar-v">'+(mins/60).toFixed(1)+'h</span></div>';
  });
  if(sortedCats.length===0)h+='<p style="color:var(--dim);font-size:13px">No done blocks recorded.</p>';
  h+='</div>';

  // Skip concentration by category
  var skipCatMins={};CATS.forEach(function(c){skipCatMins[c.id]=0});
  skippedBlks.forEach(function(b){if(!b.label||!b.cat)return;var dur=b.e-b.s;skipCatMins[b.cat]=(skipCatMins[b.cat]||0)+dur});
  var sortedSkipCats=Object.keys(skipCatMins).filter(function(k){return skipCatMins[k]>0}).sort(function(a,b){return skipCatMins[b]-skipCatMins[a]});
  if(sortedSkipCats.length>0){
    var maxSkip=skipCatMins[sortedSkipCats[0]];
    h+='<div class="card"><h3 style="font-size:15px;font-weight:700;color:var(--wht);margin-bottom:12px">\u{23ED} Skipped by Category</h3>';
    sortedSkipCats.forEach(function(catId){
      var cat=gC(catId);var mins=skipCatMins[catId];
      h+='<div class="sbar"><span class="sbar-l">'+cat.e+' '+cat.l+'</span><div class="sbar-t"><div class="sbar-f" style="width:'+Math.round(mins/maxSkip*100)+'%;background:var(--red)"></div></div><span class="sbar-v">'+(mins/60).toFixed(1)+'h</span></div>';
    });
    h+='</div>';
  }

  // Energy (done blocks only)
  var allE=[];doneBlks.forEach(function(b){if(b.energy)allE.push(b.energy)});
  if(allE.length>0){
    var avg=(allE.reduce(function(s,v){return s+v},0)/allE.length).toFixed(1);
    h+='<div class="card"><h3 style="font-size:15px;font-weight:700;color:var(--wht);margin-bottom:12px">\u{26A1} Energy (done blocks)</h3>';
    h+='<div class="srow"><span>Average</span><span style="font-weight:700;color:'+(parseFloat(avg)>=3?'var(--grn)':'var(--red)')+'">'+avg+'/5</span></div></div>';
  }
  $.innerHTML=h;
}

var pendingDT=null;
function setDayType(dtId){
  var day=ensureDay(curDate);
  if(day.dayType===dtId)return;
  if(day.dayType&&day.blocks.length>0){
    pendingDT=dtId;
    showDTModal();
    return;
  }

function showDTModal(){
  var el=document.createElement('div');el.id='dt-modal';el.className='modal-overlay';
  el.innerHTML='<div class="modal-box"><h3>Switch day type</h3><p>This day already has blocks. What would you like to do?</p><div class="modal-btns">'
    +'<button class="modal-btn primary" onclick="dtRetain()">Retain blocks</button>'
    +'<button class="modal-btn secondary" onclick="dtReplace()">Replace with template</button>'
    +'<button class="modal-btn ghost" onclick="dtCancel()">Cancel</button>'
    +'</div></div>';
  el.addEventListener('click',function(e){if(e.target===el)dtCancel()});
  document.body.appendChild(el);
}
function closeDTModal(){var m=document.getElementById('dt-modal');if(m)m.remove()}
function dtRetain(){closeDTModal();if(!pendingDT)return;var day=ensureDay(curDate);day.dayType=pendingDT;pendingDT=null;openBlk=null;sv();R()}
function dtReplace(){closeDTModal();if(!pendingDT)return;applyDayType(pendingDT,true);pendingDT=null}
function dtCancel(){closeDTModal();pendingDT=null}
async function applyDayType(dtId,replaceTpl){
  var day=ensureDay(curDate);
  var checklist=day.checklist||{};var notes=day.notes||"";var cl=day.customLabel||"";
  day.dayType=dtId;
  if(replaceTpl||!day.blocks.length){
    // Delete old blocks from Supabase first
    var oldIds=day.blocks.map(function(b){return b._id}).filter(function(id){return id});
    var tpl=data.templates[dtId]||[];
    day.blocks=tpl.map(function(b){return{s:b.s,e:b.e,label:b.label,cat:b.cat,energy:null,note:"",status:"planned",src:"tpl"}});
    day.checklist=checklist;day.notes=notes;day.customLabel=cl;
    openBlk=null;
    sv();
    saveDayToDb(curDate);
    R();
    // Async cleanup and inserts: delete old blocks, then insert new blocks
    if(authUser){
      for(var i=0;i<oldIds.length;i++){await deleteBlockFromDb(oldIds[i])}
      for(var j=0;j<day.blocks.length;j++){await insertBlockToDb(curDate,day.blocks[j])}
    }
  }else{
    day.checklist=checklist;day.notes=notes;day.customLabel=cl;
    openBlk=null;
    sv();
    saveDayToDb(curDate);
    R();
  }
}

  if(!b)return;
  var newS=b.s+delta;

function delBlk(i){

  var blockId=day.blocks[i]._id;
  day.blocks.splice(i,1);

  sv();

  R();

function addBlk(){
  var day=ensureDay(curDate);
  // Default behaviour: append after the last block in the array
  var last=day.blocks.length>0?day.blocks[day.blocks.length-1].e:480;
  var s=last;
  var e=Math.min(last+60,1440);
  // If invalid (zero/negative duration), find the earliest gap in the timeline
  if(e<=s){
    var sorted=day.blocks.slice().sort(function(a,b){return a.s-b.s});
    var found=null;
    var cursor=0;
    for(var i=0;i<sorted.length;i++){
      if(sorted[i].s>cursor){found={s:cursor,e:Math.min(cursor+60,sorted[i].s)};break}
      if(sorted[i].e>cursor)cursor=sorted[i].e;
    }
    if(!found&&cursor<1440)found={s:cursor,e:Math.min(cursor+60,1440)};
    if(found){s=found.s;e=found.e}
    else{s=480;e=540} // ultimate fallback: 8-9am, user can adjust
  }
  var newBlock={s:s,e:e,label:"",cat:"personal",energy:null,note:"",status:"unplanned"};
  day.blocks.push(newBlock);
  openBlk=day.blocks.length-1;
  sv();
  insertBlockToDb(curDate,newBlock);
  R();
}
function sortBlocksByTime(){
  var day=ensureDay(curDate);
  day.blocks.sort(function(a,b){return a.s-b.s});
  openBlk=null;sv();R();
}

// === DAY REFLECTION (v4.14.0) ===
// Structured fields are encoded as JSON within day.notes so existing schema is preserved.
// Plain text in day.notes is treated as legacy free-form notes and migrated into the freeform field.
function parseDayReflection(notesStr){
  var def={wins:['','',''],reframeNeg:'',reframePos:'',gratitude:'',freeform:''};
  if(!notesStr)return def;
  if(notesStr.charAt(0)==='{'){
    try{
      var p=JSON.parse(notesStr);
      if(p&&typeof p==='object'&&p.v==='r1'){
        return{
          wins:(p.wins&&p.wins.length===3)?p.wins:['','',''],
          reframeNeg:p.reframeNeg||'',
          reframePos:p.reframePos||'',
          gratitude:p.gratitude||'',
          freeform:p.freeform||''
        };
      }
    }catch(e){}
  }
  // Plain text → freeform
  def.freeform=notesStr;
  return def;
}
function serializeDayReflection(r){
  var hasStructured=
    (r.wins&&r.wins.some(function(w){return w&&w.trim()}))||
    (r.reframeNeg&&r.reframeNeg.trim())||
    (r.reframePos&&r.reframePos.trim())||
    (r.gratitude&&r.gratitude.trim());
  if(!hasStructured)return r.freeform||'';
  return JSON.stringify({
    v:'r1',
    wins:r.wins||['','',''],
    reframeNeg:r.reframeNeg||'',
    reframePos:r.reframePos||'',
    gratitude:r.gratitude||'',
    freeform:r.freeform||''
  });
}
function updWin(idx,v){
  var day=ensureDay(curDate);
  var r=parseDayReflection(day.notes);
  r.wins[idx]=v;
  day.notes=serializeDayReflection(r);
  sv();saveDayToDb(curDate);
}
function updReframe(field,v){
  var day=ensureDay(curDate);
  var r=parseDayReflection(day.notes);
  if(field==='neg')r.reframeNeg=v;
  else if(field==='pos')r.reframePos=v;
  day.notes=serializeDayReflection(r);
  sv();saveDayToDb(curDate);
}
function updGratitude(v){
  var day=ensureDay(curDate);
  var r=parseDayReflection(day.notes);
  r.gratitude=v;
  day.notes=serializeDayReflection(r);
  sv();saveDayToDb(curDate);
}
function updDayNote(v){
  var day=ensureDay(curDate);
  var r=parseDayReflection(day.notes);
  r.freeform=v;
  day.notes=serializeDayReflection(r);
  sv();saveDayToDb(curDate);
}

async function saveTemplateToDb(templateKey){
  if(!authUser||!data.templates[templateKey])return;
  noteLocalWrite();
  var blocks=data.templates[templateKey];
  // Find or create the template row
  var tplRes=await db.from('templates').select('id').eq('user_id',authUser.id).eq('template_key',templateKey).maybeSingle();
  if(tplRes.error){console.error('saveTemplateToDb find error:',tplRes.error);return}
  var templateId;
  if(tplRes.data){
    templateId=tplRes.data.id;
    // Delete existing blocks
    var delRes=await db.from('template_blocks').delete().eq('template_id',templateId);
    if(delRes.error){console.error('saveTemplateToDb delete error:',delRes.error);return}
    // Update the template's updated_at
    await db.from('templates').update({updated_at:new Date().toISOString()}).eq('id',templateId);
  }else{
    // Create new template row
    var insRes=await db.from('templates').insert({user_id:authUser.id,template_key:templateKey}).select().single();
    if(insRes.error){console.error('saveTemplateToDb insert error:',insRes.error);return}
    templateId=insRes.data.id;
  }
  // Insert all blocks
  if(blocks.length>0){
    var blockRows=blocks.map(function(b,idx){return{template_id:templateId,start_min:b.s,end_min:b.e,label:b.label||null,category_id:b.cat||'personal',order_index:idx+1}});
    var blkRes=await db.from('template_blocks').insert(blockRows);
    if(blkRes.error)console.error('saveTemplateToDb blocks insert error:',blkRes.error);
  }
}

async function loadMealDataFromDb(){
  if(!authUser)return;
  var [foodsRes,logsRes,weightRes,cupsRes,hydroLogsRes,hydroSettingsRes]=await Promise.all([
    fetchAllRows(function(){return db.from('food_items').select('*')}),
    fetchAllRows(function(){return db.from('meal_logs').select('*')}),

    db.from('hydration_cups').select('*').eq('is_active',true).order('order_index'),
    fetchAllRows(function(){return db.from('hydration_logs').select('*').order('created_at',{ascending:false})}),
    db.from('hydration_settings').select('*').maybeSingle()
  ]);
  if(foodsRes.error||logsRes.error){console.error('loadMealData errors:',foodsRes.error,logsRes.error);return}
  mealData.foods=foodsRes.data.map(function(f){return{_id:f.id,name:f.name,cal:f.cal,protein:f.protein,slot:f.slot,cat:f.cat||'Mains',is_active:f.is_active,quick_pick_slots:f.quick_pick_slots||[]}});
  var logs={};
  logsRes.data.forEach(function(l){
    if(!logs[l.date])logs[l.date]=[];
    logs[l.date].push({_id:l.id,slot:l.slot,food_item_id:l.food_item_id,qty:parseFloat(l.qty)});
  });
  mealData.logs=logs;
  if(!weightRes.error){
    mealData.weights=weightRes.data.map(function(w){return{_id:w.id,date:w.date,weight:parseFloat(w.weight),body_fat_pct:w.body_fat_pct?parseFloat(w.body_fat_pct):null,visceral_fat:w.visceral_fat||null,skeletal_muscle_pct:w.skeletal_muscle_pct?parseFloat(w.skeletal_muscle_pct):null,resting_metabolism:w.resting_metabolism||null,bmi:w.bmi?parseFloat(w.bmi):null,body_age:w.body_age||null}});
  }
  if(!cupsRes.error){
    mealData.hydrationCups=cupsRes.data.map(function(c){return{_id:c.id,name:c.name,ml:c.ml,order_index:c.order_index}});
  }
  if(!hydroLogsRes.error){
    mealData.hydrationLogs=hydroLogsRes.data.map(function(l){return{_id:l.id,date:l.date,ml:l.ml,cup_id:l.cup_id,created_at:l.created_at}});
  }
  if(!hydroSettingsRes.error&&hydroSettingsRes.data){
    mealData.hydrationTarget=hydroSettingsRes.data.daily_target_ml;
  }
  svMeals();
}

// === ONE-TIME CATEGORY MIGRATION ===
// Runs once to re-categorise existing 'Mains' food items into new protein-based categories
async function migrateCategoriesIfNeeded(){
  if(!authUser)return;
  var FLAG_KEY='dos-cat-migrated-v1';
  try{if(localStorage.getItem(FLAG_KEY)==='true')return}catch(e){}
  // Find items needing migration: in 'Mains' or with no category set
  var toMigrate=mealData.foods.filter(function(f){
    var c=f.cat||'';
    return c==='Mains'||c===''||(FOOD_CATS.indexOf(c)<0&&c!=='Eggs'&&c!=='Sides'&&c!=='Carbs'&&c!=='Drinks'&&c!=='Snacks');
  });
  if(!toMigrate.length){
    try{localStorage.setItem(FLAG_KEY,'true')}catch(e){}
    return;
  }
  console.log('[migration] Re-categorising '+toMigrate.length+' food items');
  var updates=[];
  toMigrate.forEach(function(f){
    var n=(f.name||'').toLowerCase();
    var newCat=guessCategory(n);
    if(newCat&&newCat!==f.cat){
      f.cat=newCat;
      updates.push(db.from('food_items').update({cat:newCat,updated_at:new Date().toISOString()}).eq('id',f._id));
    }
  });
  try{
    await Promise.all(updates);
    svMeals();
    try{localStorage.setItem(FLAG_KEY,'true')}catch(e){}
    console.log('[migration] Done: '+updates.length+' items updated');
  }catch(err){
    console.error('[migration] Failed:',err);
  }
}

function guessCategory(nameLower){
  // Soups first (so chicken soup goes to Soups, not Chicken)
  if(/\bsoup\b|bak kut teh|samgyetang|tonkotsu|paitan|tan-?men|miso\s+soup|tom\s+yum/.test(nameLower))return'Soups';
  // Fish & Seafood (check before chicken because "fish or chicken" cases default here is wrong; we keep chicken priority for mixed names)
  if(/fish|salmon|tuna|hamachi|sashimi|prawn|shrimp|ebi|unagi|ikura|tobiko|saba|mackerel|sea\s*bass|dory|sotong|cuttlefish|fish\s*maw|fish\s*ball|barramundi|cod|hotate|scallop|kaioh|chirashi|mentaiyaki|teriyaki\s+saba|crab/.test(nameLower))return'Fish & Seafood';
  // Chicken
  if(/chicken|char\s*siew|char\s*siu|tori|rendang|karaage|teriyaki\s+tori|yakitori|samgyetang/.test(nameLower))return'Chicken';
  // Other meats
  if(/beef|pork|lamb|bak\s*kut|tripe|stomach|pig|lap\s*cheong|sausage|bacon|ham|jerky|cutlet/.test(nameLower))return'Other Meats';
  // Default for anything still in Mains: Other Meats (safest catch-all rather than guessing wrong)
  return'Other Meats';
}

function getHydrationByDate(dateStr){
  if(!mealData.hydrationLogs)return 0;
  return mealData.hydrationLogs.filter(function(l){return l.date===dateStr}).reduce(function(s,l){return s+l.ml},0);
}
function isHydrationGoalHit(dateStr){
  return getHydrationByDate(dateStr)>=(mealData.hydrationTarget||3500);
}
function getLatestHydrationLogForDate(dateStr){
  if(!mealData.hydrationLogs)return null;
  var todayLogs=mealData.hydrationLogs.filter(function(l){return l.date===dateStr});
  if(!todayLogs.length)return null;
  // Sorted desc by created_at already
  return todayLogs[0];
}

// Cup management UI handlers
function cupAdd(){
  var newCup={name:'New cup',ml:250,order_index:mealData.hydrationCups.length+1};
  mealData.hydrationCups.push(newCup);
  svMeals();
  insertHydrationCup(newCup);
  R();
}
function cupUpd(idx,field,value){
  var c=mealData.hydrationCups[idx];if(!c)return;
  if(field==='ml'){var n=parseInt(value,10);if(isNaN(n)||n<=0)return;c.ml=n;}
  else c[field]=value;
  svMeals();
  updateHydrationCup(c);
  R();
}
function cupDel(idx){
  var c=mealData.hydrationCups[idx];if(!c)return;
  if(!confirm('Delete cup "'+c.name+'"? Past logs are preserved.'))return;
  var cupId=c._id;
  mealData.hydrationCups.splice(idx,1);
  svMeals();
  if(cupId)deleteHydrationCup(cupId);
  R();
}
function cupMove(idx,dir){
  var arr=mealData.hydrationCups;var j=idx+dir;
  if(j<0||j>=arr.length)return;
  var tmp=arr[idx];arr[idx]=arr[j];arr[j]=tmp;
  svMeals();
  reorderHydrationCups();
  R();
}
function targetUpd(value){
  var n=parseInt(value,10);if(isNaN(n)||n<=0||n>10000)return;
  setHydrationTarget(n);
  R();
}

function getLatestWeight(){
  if(!mealData.weights||!mealData.weights.length)return null;
  return mealData.weights[0]; // already sorted desc
}
function getPreviousWeight(){
  if(!mealData.weights||mealData.weights.length<2)return null;
  return mealData.weights[1];
}
function getWeightForDate(date){
  if(!mealData.weights)return null;
  return mealData.weights.find(function(w){return w.date===date})||null;
}

async function upsertWeightLog(date,weight){
  if(!authUser)return false;
  noteLocalWrite();
  var existing=getWeightForDate(date);
  if(existing){
    var res=await db.from('weight_logs').update({weight:weight,updated_at:new Date().toISOString()}).eq('id',existing._id);
    if(res.error){console.error('upsertWeightLog update error:',res.error);return false}
    existing.weight=weight;
  }else{
    var res=await db.from('weight_logs').insert({user_id:authUser.id,date:date,weight:weight}).select().single();
    if(res.error){console.error('upsertWeightLog insert error:',res.error);return false}
    mealData.weights.unshift({_id:res.data.id,date:date,weight:parseFloat(res.data.weight)});
    mealData.weights.sort(function(a,b){return b.date.localeCompare(a.date)});
  }
  svMeals();
  return true;
}

async function seedFoodItems(){
  if(!authUser)return;
  // Check DB directly to avoid re-seeding on cache miss
  var countRes=await db.from('food_items').select('id',{count:'exact',head:true});
  if(countRes.error){console.error('seedFoodItems count error:',countRes.error);return}
  if(countRes.count>0)return;
  noteLocalWrite();
  var rows=SEED_FOODS.map(function(f){return{user_id:authUser.id,name:f.name,cal:f.cal,protein:f.protein,slot:f.slot,cat:f.cat,is_active:true}});
  var res=await db.from('food_items').insert(rows).select();
  if(res.error){console.error('seedFoodItems error:',res.error);return}
  mealData.foods=res.data.map(function(f){return{_id:f.id,name:f.name,cal:f.cal,protein:f.protein,slot:f.slot,cat:f.cat||'Mains',is_active:f.is_active}});
  svMeals();
}

async function insertMealLog(date,slot,foodItemId,qty){
  if(!authUser)return;
  noteLocalWrite();
  var payload={user_id:authUser.id,date:date,slot:slot,food_item_id:foodItemId,qty:qty||1};

}

async function updateMealLogQty(logId,date,newQty){
  if(!authUser)return;
  noteLocalWrite();
  var res=await db.from('meal_logs').update({qty:newQty,updated_at:new Date().toISOString()}).eq('id',logId);
  if(res.error){console.error('updateMealLogQty error:',res.error);return}

async function deleteMealLog(logId,date){

async function insertFoodItem(name,cal,protein,slot,cat,quickPickSlots){
  if(!authUser)return null;
  noteLocalWrite();
  var qps=quickPickSlots||[];
  var payload={user_id:authUser.id,name:name,cal:cal,protein:protein,slot:slot,cat:cat||'Mains',is_active:true,quick_pick_slots:qps};

// === MEAL TRACKER VIEWS ===

function mealStatusColour(current,target){
  var pct=target>0?current/target:0;
  if(pct>=0.9)return'var(--grn)';
  if(pct>=0.6)return'var(--acc)';
  return'var(--mut)';
}

function mealBar(label,current,target,unit,primary,direction){
  // direction: 'ceiling' (calories - under is fine, over is bad)
  //            'floor' (protein - under is bad, over is achievement)
  var pct=Math.min(100,target>0?Math.round(current/target*100):0);
  var isOver=current>target;
  var dir=direction||'ceiling';
  var col;
  if(dir==='floor'){
    // Floor: hitting/exceeding target = green; under = accent fill
    col=isOver||current>=target?'var(--grn)':mealStatusColour(current,target);
  }else{
    // Ceiling: over = red; otherwise normal fill
    col=isOver?'var(--red)':mealStatusColour(current,target);
  }
  // Primary (protein): larger numbers, taller bar, accent flame
  // Secondary (calories): smaller numbers, slimmer bar, muted
  var labelSize=primary?'13px':'12px';
  var labelColor=primary?'var(--txt)':'var(--mut)';
  var numSize=primary?'18px':'13px';
  var numWeight=primary?'700':'600';
  var barHeight=primary?'10px':'6px';
  var barRadius=primary?'5px':'3px';
  var remSize=primary?'11px':'10px';
  var iconColor=primary?col:'var(--acc)';
  var iconHtml=primary?'<span style="color:'+iconColor+';font-size:13px;margin-right:4px">\u{1F525}</span>':'';
  var h='<div>';
  h+='<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:'+(primary?'6px':'4px')+'">';
  h+='<span style="font-size:'+labelSize+';font-weight:'+(primary?'700':'600')+';color:'+labelColor+';display:flex;align-items:center">'+iconHtml+label+'</span>';
  h+='<span style="font-size:'+numSize+';font-weight:'+numWeight+';color:'+col+'">'+current+' <span style="font-size:'+(primary?'13px':'12px')+';font-weight:400;color:var(--dim)">/ '+target+unit+'</span></span>';
  h+='</div>';
  h+='<div style="height:'+barHeight+';background:var(--bg);border-radius:'+barRadius+';overflow:hidden">';
  h+='<div style="height:100%;width:'+pct+'%;background:'+col+';border-radius:'+barRadius+';transition:width .3s"></div>';
  h+='</div>';
  var remaining=target-current;
  if(remaining>0){
    h+='<div style="font-size:'+remSize+';color:var(--dim);margin-top:3px">'+remaining+unit+' remaining</div>';
  }else if(remaining<0){
    if(dir==='floor'){
      // Over a floor target = positive
      h+='<div style="font-size:'+remSize+';color:var(--grn);font-weight:600;margin-top:3px">\u{2713} +'+Math.abs(remaining)+unit+' over target</div>';
    }else{
      // Over a ceiling target = warning
      h+='<div style="font-size:'+remSize+';color:var(--red);margin-top:3px">'+Math.abs(remaining)+unit+' over</div>';
    }
  }else{
    // Exactly at target
    if(dir==='floor'){
      h+='<div style="font-size:'+remSize+';color:var(--grn);font-weight:600;margin-top:3px">\u{2713} Target hit</div>';
    }
  }
  h+='</div>';
  return h;
}

async function saveNewFood(){
  var name=document.getElementById('nfName').value.trim();
  var cal=parseInt(document.getElementById('nfCal').value);
  var pro=parseInt(document.getElementById('nfPro').value);
  var slot=document.getElementById('nfSlot').value;
  var cat=document.getElementById('nfCat').value;
  var qps=MEAL_SLOTS.filter(function(s){var el=document.getElementById('nfQp_'+s);return el&&el.checked});
  var msg=document.getElementById('nfMsg');
  if(!name){msg.textContent='Enter a name.';msg.style.color='var(--red)';return}
  if(isNaN(cal)||cal<0){msg.textContent='Enter valid calories.';msg.style.color='var(--red)';return}
  if(isNaN(pro)||pro<0){msg.textContent='Enter valid protein.';msg.style.color='var(--red)';return}
  msg.textContent='Saving...';msg.style.color='var(--mut)';
  var result=await insertFoodItem(name,cal,pro,slot,cat,qps);
  if(result){
    nfState={name:'',cal:'',pro:'',slot:'any',cat:'Mains',qps:[]};
    view='meal_slot';mealSearchQ='';R();
  }else{
    msg.textContent='Failed to save.';msg.style.color='var(--red)';
  }
}

function confirmDeactivateFood(){
  var msg=document.getElementById('efDelMsg');
  msg.innerHTML='<button onclick="doDeactivateFood()" style="background:var(--red);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;margin-right:8px">Yes, remove it</button><button onclick="R()" style="background:var(--bg);color:var(--txt);border:1px solid var(--bdr);border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer">Cancel</button>';
}

async function doDeactivateFood(){
  var ok=await deactivateFoodItem(editFoodId);
  if(ok){editFoodId=null;view='meal_slot';mealSearchQ='';R()}
}

async function saveWeight(){
  var input=document.getElementById('weightInput');
  if(!input)return;
  var w=parseFloat(input.value);
  if(isNaN(w)||w<=0||w>300){return}
  w=Math.round(w*10)/10; // round to 1 decimal
  var ok=await upsertWeightLog(todayStr(),w);
  if(ok){weightInputActive=false;R()}
}

async function addMealItem(foodId){
  var d=getMealDate();
  // Check if already logged in this slot, if so increment qty
  var existing=getMealLogs(d).find(function(l){return l.slot===mealSlot&&l.food_item_id===foodId});
  if(existing){
    await updateMealLogQty(existing._id,d,existing.qty+1);
  }else{
    await insertMealLog(d,mealSlot,foodId,1);
  }
  R();
}

async function mealLogQty(logId,date,newQty){
  if(newQty<0.5)return;
  await updateMealLogQty(logId,date,newQty);
  R();
}

async function mealLogDel(logId,date){
  await deleteMealLog(logId,date);
  R();
}

function rWeeklyScorecard(){
  var dates=getWeekDates();
  var today=todayStr();
  var h='<div class="nav"><button class="bk" onclick="view=\'meals\';R()">\u{2190} Back</button><span class="nav-t">\u{1F4CA} Weekly Scorecard</span><span style="width:40px"></span></div>';
  // Week range label
  h+='<div style="text-align:center;margin-bottom:16px"><span style="font-size:13px;color:var(--mut)">'+fd(dates[0])+' \u{2013} '+fd(dates[6])+'</span></div>';
  // Compliance counters
  var calHit=0,proHit=0,logged=0;
  var weekCal=0,weekPro=0;
  dates.forEach(function(d){
    if(d>today)return;
    var logs=getMealLogs(d);
    if(!logs.length)return;
    logged++;
    var t=getMealTotals(d);
    weekCal+=t.cal;weekPro+=t.protein;
    if(t.cal>=MEAL_TARGETS.cal*0.85&&t.cal<=MEAL_TARGETS.cal*1.05)calHit++;
    if(t.protein>=MEAL_TARGETS.protein)proHit++;
  });
  // Summary cards
  h+='<div style="display:flex;gap:10px;margin-bottom:16px">';
  h+='<div class="card" style="flex:1;text-align:center;padding:16px 10px">';
  h+='<div style="font-size:28px;font-weight:800;color:'+(calHit>=5?'var(--grn)':calHit>=3?'var(--acc)':'var(--red)')+'">'+calHit+'<span style="font-size:16px;font-weight:400;color:var(--dim)">/'+logged+'</span></div>';
  h+='<div style="font-size:11px;color:var(--mut);margin-top:4px">Cal in range</div>';
  h+='</div>';
  h+='<div class="card" style="flex:1;text-align:center;padding:16px 10px">';
  h+='<div style="font-size:28px;font-weight:800;color:'+(proHit>=5?'var(--grn)':proHit>=3?'var(--acc)':'var(--red)')+'">'+proHit+'<span style="font-size:16px;font-weight:400;color:var(--dim)">/'+logged+'</span></div>';
  h+='<div style="font-size:11px;color:var(--mut);margin-top:4px">Protein hit</div>';
  h+='</div>';
  h+='</div>';
  // Averages
  if(logged>0){
    var avgCal=Math.round(weekCal/logged);
    var avgPro=Math.round(weekPro/logged);
    h+='<div class="card" style="padding:14px">';
    h+='<div style="font-size:12px;font-weight:600;color:var(--mut);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Daily averages</div>';
    h+='<div style="display:flex;justify-content:space-around">';
    h+='<div style="text-align:center"><div style="font-size:20px;font-weight:700">'+avgCal+'</div><div style="font-size:11px;color:var(--dim)">kcal / '+MEAL_TARGETS.cal+'</div></div>';
    h+='<div style="text-align:center"><div style="font-size:20px;font-weight:700">'+avgPro+'g</div><div style="font-size:11px;color:var(--dim)">protein / '+MEAL_TARGETS.protein+'g</div></div>';
    h+='</div></div>';
  }
  // Daily breakdown
  h+='<div class="sec"><h2 class="sec-t">Daily breakdown</h2></div>';
  dates.forEach(function(d){
    if(d>today)return;
    var logs=getMealLogs(d);
    var t=getMealTotals(d);
    var dayName=getDayName(d);
    var isT=d===today;
    var hasData=logs.length>0;
    var calOk=hasData&&t.cal>=MEAL_TARGETS.cal*0.85&&t.cal<=MEAL_TARGETS.cal*1.05;
    var proOk=hasData&&t.protein>=MEAL_TARGETS.protein;
    h+='<div class="card" style="padding:12px 14px;margin-bottom:6px;cursor:pointer;opacity:'+(hasData?'1':'0.5')+'" onclick="goMealDate(\''+d+'\')">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center">';
    h+='<div>';
    h+='<span style="font-size:14px;font-weight:700">'+dayName+'</span>';
    h+='<span style="font-size:11px;color:var(--dim);margin-left:6px">'+d.slice(5)+'</span>';
    if(isT)h+=' <span style="font-size:10px;color:var(--acc);font-weight:600">TODAY</span>';
    h+='</div>';
    if(hasData){
      h+='<div style="display:flex;align-items:center;gap:8px">';
      h+='<span style="font-size:12px;color:var(--dim)">'+t.cal+' kcal \u{00B7} '+t.protein+'g</span>';
      h+='<span style="font-size:14px">'+(calOk?'\u{2705}':'\u{274C}')+'</span>';
      h+='<span style="font-size:14px">'+(proOk?'\u{1F4AA}':'\u{26A0}\u{FE0F}')+'</span>';
      h+='</div>';
    }else{
      h+='<span style="font-size:12px;color:var(--dim)">No data</span>';
    }
    h+='</div></div>';
  });
  // Legend
  h+='<div style="padding:8px 4px;font-size:11px;color:var(--dim)">';
  h+='\u{2705} Calories in range \u{00B7} \u{274C} Calories off target \u{00B7} \u{1F4AA} Protein hit \u{00B7} \u{26A0}\u{FE0F} Protein missed';
  h+='</div>';
  $.innerHTML=h;
}

function rWeightHistory(){
  var allWeights=mealData.weights.slice().reverse(); // oldest first
  if(!allWeights.length){view='meals';R();return}
  
  // Filter by range
  var weights=allWeights;
  var today=new Date(todayStr()+'T00:00:00');
  if(weightRange!=='all'){
    var cutoff=new Date(today);
    if(weightRange==='3m')cutoff.setMonth(cutoff.getMonth()-3);
    else if(weightRange==='6m')cutoff.setMonth(cutoff.getMonth()-6);
    else if(weightRange==='1y')cutoff.setFullYear(cutoff.getFullYear()-1);
    var cutoffStr=cutoff.getFullYear()+'-'+String(cutoff.getMonth()+1).padStart(2,'0')+'-'+String(cutoff.getDate()).padStart(2,'0');
    weights=allWeights.filter(function(w){return w.date>=cutoffStr});
  }
  if(weights.length<1)weights=allWeights; // fallback if range has no data
  
  var h='<div class="nav"><button class="bk" onclick="view=\'meals\';R()">\u{2190} Back</button><span class="nav-t">\u{1F4C8} Weight History</span><span style="width:40px"></span></div>';
  
  // Summary stats (always from all data)
  var current=allWeights[allWeights.length-1];
  var allW=allWeights.map(function(w){return w.weight});
  var minW=Math.min.apply(null,allW);
  var maxW=Math.max.apply(null,allW);
  var minEntry=allWeights.find(function(w){return w.weight===minW});
  var maxEntry=allWeights.find(function(w){return w.weight===maxW});
  
  h+='<div style="display:flex;gap:8px;margin-bottom:12px">';
  h+='<div class="card" style="flex:1;text-align:center;padding:12px 8px">';
  h+='<div style="font-size:20px;font-weight:800">'+current.weight.toFixed(1)+'</div>';
  h+='<div style="font-size:10px;color:var(--dim)">Current (kg)</div></div>';
  h+='<div class="card" style="flex:1;text-align:center;padding:12px 8px">';
  h+='<div style="font-size:20px;font-weight:800;color:var(--grn)">'+minW.toFixed(1)+'</div>';
  h+='<div style="font-size:10px;color:var(--dim)">Lowest</div></div>';
  h+='<div class="card" style="flex:1;text-align:center;padding:12px 8px">';
  h+='<div style="font-size:20px;font-weight:800;color:var(--red)">'+maxW.toFixed(1)+'</div>';
  h+='<div style="font-size:10px;color:var(--dim)">Highest</div></div>';
  h+='</div>';
  
  // Range selector
  var ranges=[{k:'3m',l:'3M'},{k:'6m',l:'6M'},{k:'1y',l:'1Y'},{k:'all',l:'All'}];
  h+='<div style="display:flex;gap:6px;margin-bottom:14px;justify-content:center">';
  ranges.forEach(function(r){
    var active=r.k===weightRange;
    h+='<button onclick="weightRange=\''+r.k+'\';R()" style="padding:6px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:'+(active?'none':'1px solid var(--bdr)')+';background:'+(active?'var(--acc)':'var(--bg)')+';color:'+(active?'#fff':'var(--txt)')+'">'+r.l+'</button>';
  });
  h+='</div>';
  
  // Range stats
  var rangeW=weights.map(function(w){return w.weight});
  var rangeMin=Math.min.apply(null,rangeW);
  var rangeMax=Math.max.apply(null,rangeW);
  var rangeFirst=weights[0];
  var rangeLast=weights[weights.length-1];
  var rangeChange=rangeLast.weight-rangeFirst.weight;
  var rangeChangeStr=rangeChange>0?'+'+rangeChange.toFixed(1):rangeChange.toFixed(1);
  var rangeChangeCol=rangeChange<0?'var(--grn)':rangeChange>0?'var(--red)':'var(--dim)';
  
  if(weightRange!=='all'){
    h+='<div style="text-align:center;margin-bottom:14px;font-size:12px">';
    h+='<span style="color:var(--dim)">Change: </span><span style="color:'+rangeChangeCol+';font-weight:700">'+rangeChangeStr+' kg</span>';
    h+='</div>';
  }
  
  // SVG Chart
  var cw=360,ch=220,pad={t:20,r:15,b:40,l:40};
  var pw=cw-pad.l-pad.r,ph=ch-pad.t-pad.b;
  
  // Aggregate to weekly averages for cleaner chart
  var weekly=[];
  var weekBucket=null;var weekSum=0;var weekCount=0;
  weights.forEach(function(w){
    var d=new Date(w.date+'T00:00:00');
    var day=d.getDay();
    var monDate=new Date(d);
    monDate.setDate(d.getDate()-(day===0?6:day-1));
    var yyyy=monDate.getFullYear();
    var mm=String(monDate.getMonth()+1).padStart(2,'0');
    var dd=String(monDate.getDate()).padStart(2,'0');
    var monStr=yyyy+'-'+mm+'-'+dd;
    if(monStr!==weekBucket){
      if(weekBucket&&weekCount>0)weekly.push({date:weekBucket,weight:weekSum/weekCount});
      weekBucket=monStr;weekSum=w.weight;weekCount=1;
    }else{
      weekSum+=w.weight;weekCount++;
    }
  });
  if(weekBucket&&weekCount>0)weekly.push({date:weekBucket,weight:weekSum/weekCount});
  
  if(weekly.length<2){
    h+='<div class="card" style="text-align:center;padding:20px;color:var(--dim)">Not enough data for chart</div>';
    $.innerHTML=h;return;
  }
  
  var chartMin=Math.floor(rangeMin-1);
  var chartMax=Math.ceil(rangeMax+1);
  var wRange=chartMax-chartMin;
  
  var firstDate=new Date(weekly[0].date+'T00:00:00').getTime();
  var lastDate=new Date(weekly[weekly.length-1].date+'T00:00:00').getTime();
  var dateRange=lastDate-firstDate||1;
  
  function xPos(dateStr){
    var t=new Date(dateStr+'T00:00:00').getTime();
    return pad.l+((t-firstDate)/dateRange)*pw;
  }
  function yPos(w){
    return pad.t+ph-((w-chartMin)/wRange)*ph;
  }
  
  var points=weekly.map(function(w){return xPos(w.date).toFixed(1)+','+yPos(w.weight).toFixed(1)}).join(' ');
  var areaPoints=pad.l.toFixed(1)+','+yPos(chartMin).toFixed(1)+' '+points+' '+(pad.l+pw).toFixed(1)+','+yPos(chartMin).toFixed(1);
  
  h+='<div class="card" style="padding:12px 8px">';
  h+='<svg viewBox="0 0 '+cw+' '+ch+'" style="width:100%;height:auto" xmlns="http://www.w3.org/2000/svg">';
  
  h+='<defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">';
  h+='<stop offset="0%" stop-color="var(--acc)" stop-opacity="0.3"/>';
  h+='<stop offset="100%" stop-color="var(--acc)" stop-opacity="0.02"/>';
  h+='</linearGradient></defs>';
  
  // Grid lines and y-axis labels
  var step=wRange>20?5:wRange>10?2:1;
  for(var g=Math.ceil(chartMin/step)*step;g<=chartMax;g+=step){
    var gy=yPos(g);
    h+='<line x1="'+pad.l+'" y1="'+gy.toFixed(1)+'" x2="'+(cw-pad.r)+'" y2="'+gy.toFixed(1)+'" stroke="var(--bdr)" stroke-width="0.5"/>';
    h+='<text x="'+(pad.l-4)+'" y="'+(gy+3).toFixed(1)+'" text-anchor="end" fill="var(--dim)" font-size="9">'+g+'</text>';
  }
  
  // Month labels on x-axis - adaptive density
  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var seenMonths={};
  var monthSkip=weightRange==='all'?2:weightRange==='1y'?1:1;
  var monthIdx=0;
  weekly.forEach(function(w){
    var d=new Date(w.date+'T00:00:00');
    var key=d.getFullYear()+'-'+d.getMonth();
    if(!seenMonths[key]){
      seenMonths[key]=true;
      monthIdx++;
      if(monthIdx%monthSkip!==0&&weightRange==='all')return;
      var x=xPos(w.date);
      var label=months[d.getMonth()];
      if(d.getMonth()===0||Object.keys(seenMonths).length===1)label+='\u{2019}'+String(d.getFullYear()).slice(2);
      h+='<text x="'+x.toFixed(1)+'" y="'+(ch-pad.b+14)+'" text-anchor="middle" fill="var(--dim)" font-size="9">'+label+'</text>';
      h+='<line x1="'+x.toFixed(1)+'" y1="'+(ch-pad.b)+'" x2="'+x.toFixed(1)+'" y2="'+(ch-pad.b+3)+'" stroke="var(--dim)" stroke-width="0.5"/>';
    }
  });
  
  h+='<polygon points="'+areaPoints+'" fill="url(#wg)"/>';
  h+='<polyline points="'+points+'" fill="none" stroke="var(--acc)" stroke-width="1.5" stroke-linejoin="round"/>';
  
  // Current weight dot
  var lastPt=weekly[weekly.length-1];
  h+='<circle cx="'+xPos(lastPt.date).toFixed(1)+'" cy="'+yPos(lastPt.weight).toFixed(1)+'" r="3.5" fill="var(--acc)"/>';
  
  // Lowest weight dot in range
  var lowestWeekly=weekly.reduce(function(a,b){return a.weight<b.weight?a:b});
  if(lowestWeekly!==lastPt){
    h+='<circle cx="'+xPos(lowestWeekly.date).toFixed(1)+'" cy="'+yPos(lowestWeekly.weight).toFixed(1)+'" r="3" fill="var(--grn)"/>';
  }
  
  h+='</svg>';
  h+='</div>';
  
  // Recent entries (last 10 of entries on/after baseline 2026-05-01, chronological for chart)
  var WEIGHT_BASELINE='2026-05-01';
  var filteredW=allWeights.filter(function(w){return w.date>=WEIGHT_BASELINE});
  var recent=filteredW.slice(-10);
  if(recent.length>=2){
    var rW=recent.map(function(w){return w.weight});
    var rMin=Math.min.apply(null,rW);
    var rMax=Math.max.apply(null,rW);
    var yMin=Math.floor(rMin-0.5);
    var yMax=Math.ceil(rMax+0.5);
    if(yMax-yMin<2){yMax=yMin+2} // ensure minimum 2kg range for readability
    var yRange=yMax-yMin;
    
    var rcw=340,rch=145;
    var rpad={t:14,r:12,b:33,l:32};
    var rpw=rcw-rpad.l-rpad.r;
    var rph=rch-rpad.t-rpad.b;
    
    function rxPos(i){return rpad.l+(i/(recent.length-1))*rpw}
    function ryPos(w){return rpad.t+rph-((w-yMin)/yRange)*rph}
    
    var rPoints=recent.map(function(w,i){return rxPos(i).toFixed(2)+','+ryPos(w.weight).toFixed(2)}).join(' ');
    var rAreaPoints=rpad.l+','+(rpad.t+rph)+' '+rPoints+' '+(rpad.l+rpw)+','+(rpad.t+rph);
    
    function rShortDate(dStr){var d=new Date(dStr+'T00:00:00');return d.getDate()+'/'+(d.getMonth()+1)}
    
    h+='<div class="card" style="padding:14px;margin-top:12px">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
    h+='<div style="font-size:12px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.5px">Recent entries</div>';
    h+='<div style="font-size:10px;color:var(--dim)">Last '+recent.length+'</div>';
    h+='</div>';
    
    h+='<svg viewBox="0 0 '+rcw+' '+rch+'" style="width:100%;height:auto;display:block" xmlns="http://www.w3.org/2000/svg">';
    h+='<defs><linearGradient id="wgr" x1="0" y1="0" x2="0" y2="1">';
    h+='<stop offset="0%" stop-color="var(--acc)" stop-opacity="0.25"/>';
    h+='<stop offset="100%" stop-color="var(--acc)" stop-opacity="0.02"/>';
    h+='</linearGradient></defs>';
    
    // Y-axis grid lines and labels (integer values from yMin to yMax)
    for(var gv=yMin;gv<=yMax;gv++){
      var gy=ryPos(gv);
      h+='<line x1="'+rpad.l+'" y1="'+gy.toFixed(2)+'" x2="'+(rcw-rpad.r)+'" y2="'+gy.toFixed(2)+'" stroke="var(--bdr)" stroke-width="0.5"/>';
      h+='<text x="'+(rpad.l-4)+'" y="'+(gy+3).toFixed(2)+'" text-anchor="end" fill="var(--dim)" font-size="9">'+gv+'</text>';
    }
    
    // X-axis date labels (up to 4 anchor points: first, ~1/3, ~2/3, last)
    var labelIdx=[0];
    if(recent.length>=4){
      labelIdx.push(Math.floor((recent.length-1)/3));
      labelIdx.push(Math.floor(2*(recent.length-1)/3));
    }else if(recent.length===3){
      labelIdx.push(1);
    }
    labelIdx.push(recent.length-1);
    // Dedupe in case length is small
    var seenLi={};labelIdx=labelIdx.filter(function(i){if(seenLi[i])return false;seenLi[i]=true;return true});
    labelIdx.forEach(function(i){
      h+='<text x="'+rxPos(i).toFixed(2)+'" y="'+(rch-rpad.b+15)+'" text-anchor="middle" fill="var(--dim)" font-size="9">'+rShortDate(recent[i].date)+'</text>';
    });
    
    // Area fill + line
    h+='<polygon points="'+rAreaPoints+'" fill="url(#wgr)"/>';
    h+='<polyline points="'+rPoints+'" fill="none" stroke="var(--acc)" stroke-width="1.5" stroke-linejoin="round"/>';
    
    // Dots: directionally coloured
    recent.forEach(function(entry,i){
      var col='var(--dim)';
      if(i>0){
        var diff=entry.weight-recent[i-1].weight;
        if(Math.abs(diff)<0.05)col='var(--dim)';
        else if(diff<0)col='var(--grn)';
        else col='var(--red)';
      }
      var isLast=i===recent.length-1;
      var r=isLast?4.5:2.8;
      var stroke=isLast?' stroke="var(--txt)" stroke-width="1.5"':'';
      h+='<circle cx="'+rxPos(i).toFixed(2)+'" cy="'+ryPos(entry.weight).toFixed(2)+'" r="'+r+'"'+stroke+' fill="'+col+'"/>';
    });
    
    // Latest weight value label (above the latest dot)
    var lastEntry=recent[recent.length-1];
    var lastX=rxPos(recent.length-1);
    var lastY=ryPos(lastEntry.weight);
    h+='<text x="'+lastX.toFixed(2)+'" y="'+(lastY-8).toFixed(2)+'" text-anchor="end" fill="var(--txt)" font-size="10" font-weight="600">'+lastEntry.weight.toFixed(1)+'</text>';
    
    h+='</svg>';
    
    // Summary footer: range + net change
    var firstEntry=recent[0];
    var rChange=lastEntry.weight-firstEntry.weight;
    var rChangeStr=rChange>0?'+'+rChange.toFixed(1):rChange.toFixed(1);
    var rChangeCol=rChange<-0.05?'var(--grn)':rChange>0.05?'var(--red)':'var(--dim)';
    h+='<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--bdr);display:flex;justify-content:space-between;font-size:11px">';
    h+='<span style="color:var(--dim)">'+recent.length+' entries \u{00B7} '+fd(firstEntry.date)+' to '+fd(lastEntry.date)+'</span>';
    h+='<span style="color:'+rChangeCol+';font-weight:600">'+rChangeStr+' kg</span>';
    h+='</div>';
    
    h+='</div>';
  }else if(recent.length===1){
    // Single entry fallback
    h+='<div class="card" style="padding:14px;margin-top:12px">';
    h+='<div style="font-size:12px;font-weight:600;color:var(--mut);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Recent entries</div>';
    h+='<div style="text-align:center;padding:12px 0;font-size:13px;color:var(--dim)">Only one entry since 1 May. Log a few more to see the chart.</div>';
    h+='</div>';
  }else{
    // 0 entries since baseline fallback
    h+='<div class="card" style="padding:14px;margin-top:12px">';
    h+='<div style="font-size:12px;font-weight:600;color:var(--mut);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Recent entries</div>';
    h+='<div style="text-align:center;padding:12px 0;font-size:13px;color:var(--dim)">No entries since 1 May. Log a weight to see your journey.</div>';
    h+='</div>';
  }
  
  // Key dates (always from all data)
  h+='<div class="card" style="padding:14px;margin-top:12px">';
  h+='<div style="font-size:12px;font-weight:600;color:var(--mut);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Key dates</div>';

function rHydrationHistory(){
  var h='<div class="nav"><button class="bk" onclick="view=\'assessment\';R()">\u{2190} Back</button><span class="nav-t">Hydration History</span><span style="width:40px"></span></div>';
  var target=mealData.hydrationTarget||3500;
  var today=todayStr();
  
  // Helper: format a date as YYYY-MM-DD using local time
  function localDateStr(d){var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),da=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+da}
  
  // === Week view (last 7 days including today) ===
  h+='<div class="card" style="margin-bottom:14px">';
  h+='<h3 style="font-size:13px;font-weight:600;color:var(--mut);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px">This Week</h3>';
  var weekDays=[];
  var weekHits=0;
  for(var i=6;i>=0;i--){
    var d=new Date(today+'T00:00:00');d.setDate(d.getDate()-i);
    var ds=localDateStr(d);
    var ml=getHydrationByDate(ds);
    var hit=ml>=target;
    if(hit)weekHits++;
    weekDays.push({date:ds,ml:ml,hit:hit,dayName:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]});
  }
  h+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px">';
  weekDays.forEach(function(wd){
    var bg=wd.hit?'var(--grn-s)':wd.ml>0?'var(--card-h)':'var(--bg)';
    var col=wd.hit?'var(--grn)':'var(--dim)';
    var sym=wd.hit?'\u{2713}':wd.ml>0?'\u{2014}':'';
    h+='<div style="background:'+bg+';border:1px solid var(--bdr);border-radius:8px;padding:8px 4px;text-align:center">';
    h+='<div style="font-size:9px;color:var(--dim);margin-bottom:4px">'+wd.dayName+'</div>';
    h+='<div style="font-size:14px;color:'+col+';font-weight:700">'+sym+'</div>';
    h+='</div>';
  });
  h+='</div>';
  h+='<div style="text-align:center;margin-top:10px;font-size:12px;color:var(--mut)">'+weekHits+' / 7 days hit</div>';
  h+='</div>';
  
  // === Month view (last 30 days as heatmap) ===
  h+='<div class="card" style="margin-bottom:14px">';
  h+='<h3 style="font-size:13px;font-weight:600;color:var(--mut);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px">Last 30 Days</h3>';
  var monthDays=[];var monthHits=0;
  for(var i=29;i>=0;i--){
    var d=new Date(today+'T00:00:00');d.setDate(d.getDate()-i);
    var ds=localDateStr(d);
    var ml=getHydrationByDate(ds);
    var hit=ml>=target;
    if(hit)monthHits++;
    monthDays.push({date:ds,ml:ml,hit:hit,day:d.getDate()});
  }
  h+='<div style="display:grid;grid-template-columns:repeat(10,1fr);gap:4px">';
  monthDays.forEach(function(md){
    var bg=md.hit?'var(--grn)':md.ml>0?'var(--card-h)':'var(--bg)';
    var col=md.hit?'#fff':'var(--dim)';
    h+='<div title="'+md.date+': '+md.ml+'ml" style="background:'+bg+';border:1px solid var(--bdr);border-radius:4px;padding:6px 0;text-align:center;font-size:10px;color:'+col+';font-weight:'+(md.hit?'700':'400')+'">'+md.day+'</div>';
  });
  h+='</div>';
  var monthPct=Math.round(monthHits/30*100);
  h+='<div style="text-align:center;margin-top:10px;font-size:12px;color:var(--mut)">'+monthHits+' / 30 days hit ('+monthPct+'%)</div>';
  h+='</div>';
  
  // === Year view (last 12 months) ===
  h+='<div class="card" style="margin-bottom:14px">';
  h+='<h3 style="font-size:13px;font-weight:600;color:var(--mut);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px">Last 12 Months</h3>';
  var monthsArr=[];
  var todayDt=new Date(today+'T00:00:00');
  for(var m=11;m>=0;m--){
    var monStart=new Date(todayDt.getFullYear(),todayDt.getMonth()-m,1);
    var monEnd=new Date(todayDt.getFullYear(),todayDt.getMonth()-m+1,0);
    var hits=0,total=0;
    for(var dCursor=new Date(monStart);dCursor<=monEnd&&dCursor<=todayDt;dCursor.setDate(dCursor.getDate()+1)){
      var ds=localDateStr(dCursor);
      total++;
      if(getHydrationByDate(ds)>=target)hits++;
    }
    var pct=total>0?Math.round(hits/total*100):0;
    monthsArr.push({label:monStart.toLocaleDateString('en-GB',{month:'short',year:'2-digit'}),hits:hits,total:total,pct:pct});
  }
  monthsArr.forEach(function(mo){
    var barColor=mo.pct>=70?'var(--grn)':mo.pct>=40?'var(--acc)':'var(--bdr)';
    h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">';
    h+='<div style="width:60px;font-size:11px;color:var(--mut);flex-shrink:0">'+mo.label+'</div>';
    h+='<div style="flex:1;height:14px;background:var(--bg);border-radius:7px;overflow:hidden;position:relative"><div style="height:100%;background:'+barColor+';width:'+mo.pct+'%"></div></div>';
    h+='<div style="width:50px;text-align:right;font-size:11px;color:var(--dim);flex-shrink:0">'+mo.hits+'/'+mo.total+'</div>';
    h+='</div>';
  });
  h+='</div>';
  
  $.innerHTML=h;
}


// Paginated read: Supabase caps a single select at 1000 rows, so page through
// any table that grows with daily use until every row is fetched.
// buildQuery must return a fresh query builder each call (range() consumes it).
async function fetchAllRows(buildQuery){
  var pageSize=1000;
  var from=0;
  var all=[];
  while(true){
    var res=await buildQuery().range(from,from+pageSize-1);
    if(res.error)return{data:all,error:res.error};
    var batch=res.data||[];
    all=all.concat(batch);
    if(batch.length<pageSize)break;
    from+=pageSize;
  }
  return{data:all,error:null};
}

async function loadDataFromDb(){
  if(!authUser)return;
  
  // Fetch all data in parallel. blocks, days and day_checklist are paginated
  // because they grow past the 1000-row read cap with daily use.
  var [daysRes,blocksRes,templatesRes,tmplBlocksRes,activitiesRes,checklistRes,dayChkRes,goalsRes]=await Promise.all([
    fetchAllRows(function(){return db.from('days').select('*')}),
    fetchAllRows(function(){return db.from('blocks').select('*')}),
    db.from('templates').select('*'),
    db.from('template_blocks').select('*'),
    db.from('activities').select('*').eq('is_predefined',false),
    db.from('checklist_items').select('*').order('order_index'),
    fetchAllRows(function(){return db.from('day_checklist').select('*')}),
    db.from('goals').select('*').order('order_index')
  ]);
  
  // Check for errors
  var errors=[daysRes.error,blocksRes.error,templatesRes.error,tmplBlocksRes.error,activitiesRes.error,checklistRes.error,dayChkRes.error,goalsRes.error].filter(function(e){return e});
  if(errors.length){console.error('Load errors:',errors);return}
  
  // Build days object
  var days={};
  daysRes.data.forEach(function(d){
    days[d.date]={dayType:d.day_type,customLabel:d.custom_label||'',notes:d.notes||'',morningEnergy:d.morning_energy,blocks:[],checklist:{}};
  });
  
  // Attach blocks to their days
  blocksRes.data.forEach(function(b){
    if(!days[b.date])days[b.date]={dayType:null,customLabel:'',notes:'',morningEnergy:null,blocks:[],checklist:{}};
    days[b.date].blocks.push({_id:b.id,s:b.start_min,e:b.end_min,label:b.label||'',cat:b.category_id,energy:b.energy,status:b.status,note:b.note||''});
  });
  
  // Attach checklist state to days
  dayChkRes.data.forEach(function(c){
    if(days[c.date])days[c.date].checklist[c.item_id]=c.checked;
  });
  
  // Sort blocks within each day by start time
  Object.keys(days).forEach(function(d){days[d].blocks.sort(function(a,b){return a.s-b.s})});
  
  // Build templates object
  var templates={};
  templatesRes.data.forEach(function(t){
    templates[t.template_key]={_id:t.id,blocks:[]};
  });
  tmplBlocksRes.data.forEach(function(b){
    var tpl=Object.values(templates).filter(function(t){return t._id===b.template_id})[0];
    if(tpl)tpl.blocks.push({s:b.start_min,e:b.end_min,label:b.label||'',cat:b.category_id});
  });
  // Convert templates to flat block arrays (same shape as before)
  var templatesFlat={};
  Object.keys(templates).forEach(function(k){
    templates[k].blocks.sort(function(a,b){return a.s-b.s});
    templatesFlat[k]=templates[k].blocks;
  });
  
  // Build customActivities array (only active ones)
  var customActivities=activitiesRes.data.filter(function(a){return a.is_active!==false}).map(function(a){return{_id:a.id,l:a.label,cat:a.category_id,grp:a.group_name}});
  
  // Build checklist definitions array
  var checklist=checklistRes.data.map(function(c){return{id:c.item_id,l:c.label,goal_id:c.goal_id||null}});
  
  // Build goals array
  var goals=goalsRes.data.map(function(g){return{_id:g.id,name:g.name,description:g.description||'',status:g.status,order_index:g.order_index}});
  
  // Replace the global data object
  data={days:days,templates:templatesFlat,customActivities:customActivities,checklist:checklist,goals:goals};
  // Update local cache
  try{sv()}catch(e){console.warn('[loadDataFromDb] Cache save failed:',e)}
}

// Realtime sync: subscribe to changes from other devices
var realtimeChannel=null;
var realtimeReloadTimer=null;
var lastLocalWriteAt=0;
function noteLocalWrite(){lastLocalWriteAt=Date.now()}
function setupRealtimeSync(){
  if(realtimeChannel||!authUser)return;
  console.log('[realtime] Setting up subscription');
  realtimeChannel=db.channel('user-data-'+authUser.id)
    .on('postgres_changes',{event:'*',schema:'public',table:'days',filter:'user_id=eq.'+authUser.id},triggerReload)
    .on('postgres_changes',{event:'*',schema:'public',table:'blocks',filter:'user_id=eq.'+authUser.id},triggerReload)
    .on('postgres_changes',{event:'*',schema:'public',table:'day_checklist',filter:'user_id=eq.'+authUser.id},triggerReload)
    .on('postgres_changes',{event:'*',schema:'public',table:'checklist_items',filter:'user_id=eq.'+authUser.id},triggerReload)
    .on('postgres_changes',{event:'*',schema:'public',table:'activities',filter:'user_id=eq.'+authUser.id},triggerReload)
    .on('postgres_changes',{event:'*',schema:'public',table:'templates',filter:'user_id=eq.'+authUser.id},triggerReload)
    .on('postgres_changes',{event:'*',schema:'public',table:'goals',filter:'user_id=eq.'+authUser.id},triggerReload)
    .on('postgres_changes',{event:'*',schema:'public',table:'food_items',filter:'user_id=eq.'+authUser.id},triggerMealReload)
    .on('postgres_changes',{event:'*',schema:'public',table:'meal_logs',filter:'user_id=eq.'+authUser.id},triggerMealReload)
    .on('postgres_changes',{event:'*',schema:'public',table:'weight_logs',filter:'user_id=eq.'+authUser.id},triggerMealReload)
    .on('postgres_changes',{event:'*',schema:'public',table:'hydration_cups',filter:'user_id=eq.'+authUser.id},triggerMealReload)
    .on('postgres_changes',{event:'*',schema:'public',table:'hydration_logs',filter:'user_id=eq.'+authUser.id},triggerMealReload)
    .on('postgres_changes',{event:'*',schema:'public',table:'hydration_settings',filter:'user_id=eq.'+authUser.id},triggerMealReload)
    .subscribe(function(status){console.log('[realtime] Status:',status)});
}

// Debounced reload triggered by realtime events
function triggerReload(payload){
  console.log('[realtime] Change detected:',payload.table,payload.eventType);
  // Skip reload if this device made a local write recently — likely the change is our own
  if(Date.now()-lastLocalWriteAt<3000){
    console.log('[realtime] Skipping reload — recent local write');
    return;
  }
  if(realtimeReloadTimer)clearTimeout(realtimeReloadTimer);
  realtimeReloadTimer=setTimeout(async function(){
    try{
      await loadDataFromDb();
      requestAnimationFrame(function(){
        try{R();console.log('[realtime] Reloaded and re-rendered')}catch(e){console.error('[realtime] R() threw:',e)}
      });
    }catch(err){
      console.error('[realtime] Reload failed:',err);
    }
  },500); // 500ms debounce - batch multiple changes together
}

var mealReloadTimer=null;
function triggerMealReload(payload){
  console.log('[realtime] Meal change detected:',payload.table,payload.eventType);
  if(Date.now()-lastLocalWriteAt<3000){console.log('[realtime] Skipping meal reload — recent local write');return}
  if(mealReloadTimer)clearTimeout(mealReloadTimer);
  mealReloadTimer=setTimeout(async function(){
    try{
      await loadMealDataFromDb();
      requestAnimationFrame(function(){try{R()}catch(e){}});
    }catch(err){console.error('[realtime] Meal reload failed:',err)}
  },500);
}

var appInitialised=false;
var initialAuthHandled=false;

async function handleAuthState(session){
  authUser=session?session.user:null;
  // If logged in and we have a cached data object, render from cache immediately for instant UI
  if(authUser){
    var cached=ld();
    if(cached&&cached.days){
      data=cached;
      console.log('[handleAuthState] Rendered from cache');
    }
    var cachedMeals=ldMeals();
    if(cachedMeals&&cachedMeals.foods){mealData=cachedMeals;console.log('[handleAuthState] Meal data from cache')}
  }
  // Render immediately with current state (login screen if no auth, cache if logged in, empty otherwise)
  requestAnimationFrame(function(){
    try{R();}catch(rErr){console.error('[handleAuthState] R() threw:',rErr)}
  });
  // Then fetch fresh data from Supabase in the background
  if(authUser){
    setTimeout(async function(){
      try{
        await loadDataFromDb();
        console.log('[handleAuthState] Fresh data loaded');
        await loadMealDataFromDb();
        await seedFoodItems();
        await migrateCategoriesIfNeeded();
        console.log('[handleAuthState] Meal data loaded');
        requestAnimationFrame(function(){
          try{R();console.log('[handleAuthState] R() complete, body length:',$.innerHTML.length)}catch(e){console.error('[handleAuthState] R() threw:',e)}
        });
        // Set up realtime subscriptions after first successful load
        setupRealtimeSync();
      }catch(loadErr){
        console.error('[handleAuthState] loadDataFromDb failed:',loadErr);
      }
    },200);
  }
}

db.auth.onAuthStateChange(async function(event,session){
  console.log('[onAuthStateChange] event:',event);
  // Any auth event counts as the initial signal, not just INITIAL_SESSION
  initialAuthHandled=true;
  await handleAuthState(session);
});

function startApp(){
  if(!document.getElementById('app')){
    console.warn('[startApp] #app not found, retrying');
    setTimeout(startApp,50);
    return;
  }
  console.log('[startApp] Ready');
  // Fallback: if INITIAL_SESSION never fires within 2 seconds, render login
  setTimeout(function(){
    if(!initialAuthHandled){
      console.warn('[startApp] No auth event after 2s, rendering anyway');
      handleAuthState(null);
    }
  },2000);
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',startApp);
}else{
  setTimeout(startApp,0);
}
