<style>
:root{--bg:#0f1117;--card:#1a1d27;--card-h:#22263a;--bdr:#2a2e3e;--acc:#e8a838;--acc-s:rgba(232,168,56,.12);--grn:#34d399;--grn-s:rgba(52,211,153,.12);--red:#f87171;--red-s:rgba(248,113,113,.12);--txt:#e8e9ed;--mut:#8b8fa3;--dim:#5c6078;--wht:#fff;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'SF Pro Text','Helvetica Neue',sans-serif;background:var(--bg);color:var(--txt);min-height:100dvh;padding-top:var(--st);padding-bottom:var(--sb);overscroll-behavior:none;-webkit-font-smoothing:antialiased}
#app{max-width:480px;margin:0 auto;padding:0 16px 40px}
button{font-family:inherit;cursor:pointer;-webkit-appearance:none}input,select,textarea{font-family:inherit}
.btn{width:100%;border:none;border-radius:12px;font-size:15px;font-weight:700;padding:15px;display:flex;align-items:center;justify-content:center;gap:8px}
.ba{background:var(--acc);color:#1a1d27}.ba:disabled{opacity:.4}
.bo{background:transparent;color:var(--acc);border:1.5px solid var(--acc);font-weight:600;font-size:14px;margin-top:10px}
.bd{background:transparent;color:var(--mut);border:1px dashed var(--bdr);font-size:14px;font-weight:500;margin-top:8px;padding:12px}
.bsm{padding:8px 14px;background:var(--acc-s);color:var(--acc);border:1px solid var(--acc);border-radius:8px;font-size:13px;font-weight:600;width:auto}
.bsm-m{padding:8px 14px;background:transparent;color:var(--mut);border:1px solid var(--bdr);border-radius:8px;font-size:13px;width:auto}
.hdr{text-align:center;padding:28px 0 20px}.hdr h1{font-size:24px;font-weight:700;color:var(--wht);letter-spacing:-.5px}.hdr p{font-size:13px;color:var(--mut);margin-top:3px}
.nav{display:flex;align-items:center;justify-content:space-between;padding:16px 0 10px;position:sticky;top:0;background:var(--bg);z-index:10}
.nav .bk{background:transparent;border:none;color:var(--acc);font-size:15px;font-weight:600;padding:8px 0}
.nav-t{font-size:16px;font-weight:700;color:var(--wht)}
.sec{margin-top:20px}.sec-t{font-size:13px;font-weight:600;color:var(--mut);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
.wk-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--card);border:1px solid var(--bdr);border-radius:10px;margin-bottom:8px;cursor:pointer}.wk-hdr:active{background:var(--card-h)}
.wk-hdr-l{font-size:13px;font-weight:600;color:var(--txt)}.wk-hdr-r{font-size:12px;color:var(--mut)}
.wk-arrow{font-size:11px;color:var(--dim);margin-left:8px;transition:transform .2s;display:inline-block}.wk-arrow.open{transform:rotate(90deg)}
.fld{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--bdr);border-radius:8px;color:var(--txt);font-size:14px;outline:none}
.fld::placeholder{color:var(--dim);opacity:1}
.lbl{display:block;font-size:11px;color:var(--mut);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
textarea{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--bdr);border-radius:8px;color:var(--txt);font-size:14px;resize:vertical;outline:none;line-height:1.5}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.card{background:var(--card);border-radius:12px;border:1px solid var(--bdr);padding:16px;margin-bottom:10px}
.dc{display:flex;justify-content:space-between;align-items:center;background:var(--card);border-radius:12px;padding:13px 16px;margin-bottom:8px;cursor:pointer;border:1px solid var(--bdr)}.dc:active{background:var(--card-h)}.dc.today{border-color:var(--acc)}
.dc-l{display:flex;align-items:center;gap:12px}
.dc-dt{font-size:14px;font-weight:600}.dc-m{font-size:12px;color:var(--mut);margin-top:2px}
.dtag{padding:4px 8px;border-radius:6px;font-size:11px;font-weight:600}
.blk{background:var(--card);border-radius:10px;border:1px solid var(--bdr);margin-bottom:6px;overflow:hidden}
.blk.planned{border-color:var(--grn)}.blk.unplanned{border-color:var(--acc)}.blk.skipped{opacity:.45}
.blk-top{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;cursor:pointer}.blk-top:active{background:var(--card-h)}
.blk-time{font-size:13px;font-weight:700;color:var(--mut);min-width:100px}
.blk-name{font-size:13px;font-weight:600;flex:1;margin-left:8px}
.blk-acts{display:flex;gap:4px}.blk-acts button{background:transparent;border:none;font-size:14px;padding:4px}
.blk-body{padding:0 14px 14px;border-top:1px solid var(--bdr)}
.cl-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--bdr);cursor:pointer}
.cl-item:last-child{border-bottom:none}
.cl-box{width:24px;height:24px;border-radius:6px;border:2px solid var(--bdr);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.cl-item.on .cl-box{border-color:var(--grn);background:var(--grn);color:#0f1117}
.cl-label{font-size:14px}.cl-item.on .cl-label{color:var(--dim);text-decoration:line-through}
.cat-work{color:#60a5fa}.cat-family{color:#f472b6}.cat-health{color:#34d399}.cat-rest{color:#a78bfa}.cat-commute{color:#fb923c}.cat-chores{color:#fbbf24}.cat-fun{color:#22d3ee}.cat-sleep{color:#6366f1}.cat-personal{color:#94a3b8}
.po{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:20;display:flex;align-items:flex-end;justify-content:center}
.ps{background:var(--card);border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;padding:20px 16px calc(20px + var(--sb))}
.ps h3{font-size:16px;font-weight:700;color:var(--wht);margin-bottom:16px;text-align:center}
.scroll-wrap{height:150px;overflow-y:auto;-webkit-overflow-scrolling:touch;border-radius:10px;border:1px solid var(--bdr);background:var(--bg);width:80px;scroll-snap-type:y mandatory;scrollbar-width:none}
.scroll-wrap::-webkit-scrollbar{display:none}
.scroll-item{height:50px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--dim);scroll-snap-align:center;cursor:pointer}
.scroll-item.on{color:var(--acc);background:var(--acc-s)}
.eng{display:flex;gap:5px;margin:8px 0}
.eng-b{width:34px;height:34px;border-radius:8px;border:1px solid var(--bdr);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--mut)}
.eng-b.on{border-color:var(--acc);background:var(--acc-s);color:var(--acc)}
.sbar{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.sbar-l{font-size:13px;font-weight:600;min-width:80px}
.sbar-t{flex:1;height:18px;background:var(--bg);border-radius:4px;overflow:hidden}
.sbar-f{height:100%;border-radius:4px}
.sbar-v{font-size:13px;font-weight:700;min-width:50px;text-align:right}
.srow{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bdr);font-size:13px}.srow:last-child{border-bottom:none}
.streak{display:flex;gap:3px;margin:4px 0}
.streak-d{width:16px;height:16px;border-radius:3px;font-size:8px;display:flex;align-items:center;justify-content:center}
.ei-row{display:flex;gap:8px;margin-top:8px}
.dt-btn{padding:10px 12px;border-radius:10px;font-size:13px;font-weight:600;border:1px solid var(--bdr);background:var(--bg);color:var(--mut);cursor:pointer;text-align:center}
.dt-btn.on{border-color:var(--acc);background:var(--acc-s);color:var(--acc)}
select.grp{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--bdr);border-radius:8px;color:var(--txt);font-size:14px;outline:none;appearance:none}
select.grp option{color:var(--txt);background:var(--bg)}
select.grp optgroup{color:var(--acc);font-weight:700;font-style:normal;background:var(--card)}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
.modal-box{background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:24px 20px;max-width:340px;width:100%}
.modal-box h3{font-size:16px;font-weight:700;color:var(--wht);margin-bottom:8px}
.modal-box p{font-size:13px;color:var(--mut);line-height:1.5;margin-bottom:20px}
.modal-btns{display:flex;flex-direction:column;gap:8px}
.modal-btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
.modal-btn.primary{background:var(--acc);color:#1a1d27}
.modal-btn.secondary{background:var(--bg);color:var(--txt);border:1px solid var(--bdr)}
.modal-btn.ghost{background:transparent;color:var(--mut);font-weight:500}

function addDays(d,n){var dt=new Date(d+"T00:00:00");dt.setDate(dt.getDate()+n);return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0')}
function mTS(m){if(m>=1440)return"12:00am";var h=Math.floor(m/60),mn=m%60;var ap=h>=12?'pm':'am';var h12=h===0?12:h>12?h-12:h;return h12+':'+(mn<10?'0':'')+mn+ap}
function durS(m){var h=Math.floor(m/60),mn=m%60;if(h===0)return mn+'min';if(mn===0)return h+'h';return h+'h '+mn+'min'}
function getMonday(d){var dt=new Date(d+"T00:00:00");var day=dt.getDay();var diff=day===0?6:day-1;dt.setDate(dt.getDate()-diff);return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0')}

async function sendMagicLink(){

  var msgEl=document.getElementById('loginMsg');
  if(!email){msgEl.textContent='Enter your email first.';msgEl.style.color='var(--red)';return}
  msgEl.textContent='Sending...';
  msgEl.style.color='var(--mut)';
  try{

function rSummary(){
  var today=todayStr();
  var h='<div class="nav"><button class="bk" onclick="view=\'home\';R()">\u{2190} Back</button><span class="nav-t">Weekly Summary</span><span style="width:40px"></span></div>';
  var days7=[];for(var i=6;i>=0;i--){var dt=addDays(today,-i);var dy=getDay(dt);if(dy&&dy.blocks.length>0)days7.push({date:dt,day:dy})}
  if(days7.length===0){h+='<div class="card"><p style="color:var(--dim)">No data for the past 7 days.</p></div>';$.innerHTML=h;return}

  // Collect all blocks
  var allBlks=[];days7.forEach(function(d){d.day.blocks.forEach(function(b){allBlks.push(b)})});
  var plannedBlks=allBlks.filter(function(b){return b.status==='planned'});
  var unplannedBlks=allBlks.filter(function(b){return b.status==='unplanned'});
  var skippedBlks=allBlks.filter(function(b){return b.status==='skipped'});
  var doneBlks=plannedBlks.concat(unplannedBlks);

  var plannedMins=plannedBlks.reduce(function(s,b){return s+(b.e-b.s)},0);
  var unplannedMins=unplannedBlks.reduce(function(s,b){return s+(b.e-b.s)},0);
  var skippedMins=skippedBlks.reduce(function(s,b){return s+(b.e-b.s)},0);
  var doneMins=plannedMins+unplannedMins;

  // Headline metrics
  var adherence=plannedMins+skippedMins>0?Math.round(plannedMins/(plannedMins+skippedMins)*100):100;
  var disruption=doneMins>0?Math.round(unplannedMins/doneMins*100):0;

  h+='<div class="card"><h3 style="font-size:15px;font-weight:700;color:var(--wht);margin-bottom:12px">\u{1F3AF} Key Metrics</h3>';
  h+='<div class="srow"><span>Adherence rate</span><span style="font-weight:700;color:'+(adherence>=70?'var(--grn)':'var(--red)')+'">'+adherence+'%</span></div>';
  h+='<div style="font-size:11px;color:var(--dim);margin-bottom:8px">Planned done / (Planned done + Skipped)</div>';
  h+='<div class="srow"><span>Disruption load</span><span style="font-weight:700;color:'+(disruption<=35?'var(--grn)':'var(--acc)')+'">'+disruption+'%</span></div>';
  h+='<div style="font-size:11px;color:var(--dim);margin-bottom:8px">Unplanned / all done hours</div>';
  h+='<div class="srow"><span>Planned</span><span style="font-weight:700;color:var(--grn)">'+(plannedMins/60).toFixed(1)+'h</span></div>';
  h+='<div class="srow"><span>Unplanned</span><span style="font-weight:700;color:var(--acc)">'+(unplannedMins/60).toFixed(1)+'h</span></div>';
  h+='<div class="srow"><span>Skipped</span><span style="font-weight:700;color:var(--red)">'+(skippedMins/60).toFixed(1)+'h</span></div>';
  h+='</div>';

  // Morning Energy card
  var meVals=days7.filter(function(d){return d.day.morningEnergy}).map(function(d){return d.day.morningEnergy});
  h+='<div class="card"><h3 style="font-size:15px;font-weight:700;color:var(--wht);margin-bottom:12px">\u{2600}\u{FE0F} Morning Energy (7 days)</h3>';
  if(!meVals.length){
    h+='<p style="font-size:13px;color:var(--dim)">No morning energy logged yet. Log it first thing each day to track sleep recovery.</p>';
  } else {
    var meAvg=meVals.reduce(function(a,b){return a+b},0)/meVals.length;
    var meAbove3=meVals.filter(function(v){return v>=3}).length;
    h+='<div class="srow"><span>Average</span><span style="font-weight:700;color:'+(meAvg>=3?'var(--grn)':'var(--red)')+'">'+meAvg.toFixed(1)+'/5</span></div>';
    h+='<div class="srow"><span>Days logged</span><span style="font-weight:700">'+meVals.length+'/7</span></div>';
    h+='<div class="srow"><span>Days at 3 or above</span><span style="font-weight:700;color:var(--grn)">'+meAbove3+'</span></div>';
    h+='<div style="display:flex;gap:4px;margin-top:10px">';
    for(var mi=6;mi>=0;mi--){
      var mdt=addDays(today,-mi);var mdy=getDay(mdt);var mv=mdy&&mdy.morningEnergy;
      var mbg=mv?(mv>=4?'var(--grn)':mv>=3?'var(--acc)':'var(--red)'):'var(--bdr)';
      h+='<div style="flex:1;padding:6px 0;border-radius:4px;text-align:center;font-size:12px;font-weight:700;background:'+mbg+';color:'+(mv?'#0f1117':'var(--dim)')+'">'+(mv||'-')+'</div>';
    }
    h+='</div>';
  }
  h+='</div>';

  // Checklist streaks
  h+='<div class="card"><h3 style="font-size:15px;font-weight:700;color:var(--wht);margin-bottom:12px">\u{2705} Habit Streaks (7 days)</h3>';
  data.checklist.forEach(function(c){
    var hits=0;
    h+='<div style="margin-bottom:10px"><div style="font-size:13px;font-weight:600;margin-bottom:4px">'+c.l+'</div><div class="streak">';
    for(var i=6;i>=0;i--){
      var dt=addDays(today,-i);var dy=getDay(dt);
      var on=dy&&dy.checklist&&dy.checklist[c.id];
      if(on)hits++;
      h+='<div class="streak-d" style="background:'+(on?'var(--grn)':'var(--bdr)')+';color:'+(on?'#0f1117':'var(--dim)')+'">'+(on?'\u{2713}':'')+'</div>';
    }
    h+='<span style="font-size:12px;color:var(--dim);margin-left:6px">'+hits+'/7</span></div></div>';
  });
  h+='</div>';

  // Time by category (done blocks only)
  var catMins={};CATS.forEach(function(c){catMins[c.id]=0});
  doneBlks.forEach(function(b){var dur=b.e-b.s;catMins[b.cat]=(catMins[b.cat]||0)+dur});
  var sortedCats=Object.keys(catMins).filter(function(k){return catMins[k]>0}).sort(function(a,b){return catMins[b]-catMins[a]});
  var maxCat=sortedCats.length?catMins[sortedCats[0]]:1;
  h+='<div class="card"><h3 style="font-size:15px;font-weight:700;color:var(--wht);margin-bottom:12px">\u{1F4CA} Time by Category (done only)</h3>';
  sortedCats.forEach(function(catId){
    var cat=gC(catId);var mins=catMins[catId];
    h+='<div class="sbar"><span class="sbar-l">'+cat.e+' '+cat.l+'</span><div class="sbar-t"><div class="sbar-f" style="width:'+Math.round(mins/maxCat*100)+'%;background:'+cat.c+'"></div></div><span class="sbar-v">'+(mins/60).toFixed(1)+'h</span></div>';
  });
  if(sortedCats.length===0)h+='<p style="color:var(--dim);font-size:13px">No done blocks recorded.</p>';
  h+='</div>';

  // Skip concentration by category
  var skipCatMins={};CATS.forEach(function(c){skipCatMins[c.id]=0});
  skippedBlks.forEach(function(b){var dur=b.e-b.s;skipCatMins[b.cat]=(skipCatMins[b.cat]||0)+dur});
  var sortedSkipCats=Object.keys(skipCatMins).filter(function(k){return skipCatMins[k]>0}).sort(function(a,b){return skipCatMins[b]-skipCatMins[a]});
  if(sortedSkipCats.length>0){
    var maxSkip=skipCatMins[sortedSkipCats[0]];
    h+='<div class="card"><h3 style="font-size:15px;font-weight:700;color:var(--wht);margin-bottom:12px">\u{23ED} Skipped by Category</h3>';
    sortedSkipCats.forEach(function(catId){
      var cat=gC(catId);var mins=skipCatMins[catId];
      h+='<div class="sbar"><span class="sbar-l">'+cat.e+' '+cat.l+'</span><div class="sbar-t"><div class="sbar-f" style="width:'+Math.round(mins/maxSkip*100)+'%;background:var(--red)"></div></div><span class="sbar-v">'+(mins/60).toFixed(1)+'h</span></div>';
    });
    h+='</div>';
  }

  // Energy (done blocks only)
  var allE=[];doneBlks.forEach(function(b){if(b.energy)allE.push(b.energy)});
  if(allE.length>0){
    var avg=(allE.reduce(function(s,v){return s+v},0)/allE.length).toFixed(1);
    h+='<div class="card"><h3 style="font-size:15px;font-weight:700;color:var(--wht);margin-bottom:12px">\u{26A1} Energy (done blocks)</h3>';
    h+='<div class="srow"><span>Average</span><span style="font-weight:700;color:'+(parseFloat(avg)>=3?'var(--grn)':'var(--red)')+'">'+avg+'/5</span></div></div>';
  }
  $.innerHTML=h;
}

// ===== ACTIONS =====
var pendingDT=null;
function setDayType(dtId){
  var day=ensureDay(curDate);
  if(day.dayType===dtId)return;
  if(day.dayType&&day.blocks.length>0){
    pendingDT=dtId;
    showDTModal();
    return;
  }
  applyDayType(dtId,false);
}
function showDTModal(){
  var el=document.createElement('div');el.id='dt-modal';el.className='modal-overlay';
  el.innerHTML='<div class="modal-box"><h3>Switch day type</h3><p>This day already has blocks. What would you like to do?</p><div class="modal-btns">'
    +'<button class="modal-btn primary" onclick="dtRetain()">Retain blocks</button>'
    +'<button class="modal-btn secondary" onclick="dtReplace()">Replace with template</button>'
    +'<button class="modal-btn ghost" onclick="dtCancel()">Cancel</button>'
    +'</div></div>';
  el.addEventListener('click',function(e){if(e.target===el)dtCancel()});
  document.body.appendChild(el);
}
function closeDTModal(){var m=document.getElementById('dt-modal');if(m)m.remove()}
function dtRetain(){closeDTModal();if(!pendingDT)return;var day=ensureDay(curDate);day.dayType=pendingDT;pendingDT=null;openBlk=null;sv();R()}
function dtReplace(){closeDTModal();if(!pendingDT)return;applyDayType(pendingDT,true);pendingDT=null}
function dtCancel(){closeDTModal();pendingDT=null}
async function applyDayType(dtId,replaceTpl){
  var day=ensureDay(curDate);
  var checklist=day.checklist||{};var notes=day.notes||"";var cl=day.customLabel||"";
  day.dayType=dtId;
  if(replaceTpl||!day.blocks.length){
    // Delete old blocks from Supabase first
    var oldIds=day.blocks.map(function(b){return b._id}).filter(function(id){return id});
    var tpl=data.templates[dtId]||[];
    day.blocks=tpl.map(function(b){return{s:b.s,e:b.e,label:b.label,cat:b.cat,energy:null,note:"",status:"planned",src:"tpl"}});
    day.checklist=checklist;day.notes=notes;day.customLabel=cl;
    openBlk=null;
    sv();
    saveDayToDb(curDate);
    R();
    // Async cleanup and inserts: delete old blocks, then insert new blocks
    if(authUser){
      for(var i=0;i<oldIds.length;i++){await deleteBlockFromDb(oldIds[i])}
      for(var j=0;j<day.blocks.length;j++){await insertBlockToDb(curDate,day.blocks[j])}
    }
  }else{
    day.checklist=checklist;day.notes=notes;day.customLabel=cl;
    openBlk=null;
    sv();
    saveDayToDb(curDate);
    R();
  }
}

function setCustomLabel(v){var day=ensureDay(curDate);day.customLabel=v;sv();saveDayToDb(curDate)}
//function setMorningEnergy(v){var day=ensureDay(curDate);day.morningEnergy=v;sv();R()}
function setMorningEnergy(v){var day=ensureDay(curDate);day.morningEnergy=v;sv();saveDayToDb(curDate);R()}
function toggleCheck(id){
  var day=ensureDay(curDate);
  day.checklist[id]=!day.checklist[id];
  sv();
  saveDayChecklistToDb(curDate,id,day.checklist[id]);
  R();
}
function actSel(i,val){
  var day=ensureDay(curDate);
  if(!val)return;

  var act=gAct(val);
  day.blocks[i].label=val;
  if(act)day.blocks[i].cat=act.cat;
  sv();
  updateBlockInDb(day.blocks[i]);
  R();
}
function updBlk(i,field,val){
  var day=ensureDay(curDate);
  if(field==='energy'){val=parseInt(val);if(day.blocks[i].energy===val)val=null}
  if(field==='status'){day.blocks[i].status=day.blocks[i].status===val?null:val}
  else{day.blocks[i][field]=val}
  var b=day.blocks[i];
  if((field==='cat'||field==='label')&&b.label&&!ACTIVITIES.some(function(a){return a.l===b.label})){
    var existingIdx=-1;
    for(var k=0;k<data.customActivities.length;k++){if(data.customActivities[k].l===b.label){existingIdx=k;break}}
    if(existingIdx>=0){
      data.customActivities[existingIdx].cat=b.cat;
      updateCustomActivityInDb(data.customActivities[existingIdx]);
    }else{
      var newAct={l:b.label,cat:b.cat,grp:"My Activities"};
      data.customActivities.push(newAct);
      insertCustomActivityToDb(newAct);
    }
  }
  sv();
  updateBlockInDb(b);
  if(field==='cat'||field==='energy'||field==='status'||field==='label')R();
}
function delCustomActivity(label){

}

async function saveDayToDb(date){
  if(!authUser||!data.days[date])return;
  var d=data.days[date];
  var payload={
    user_id:authUser.id,
    date:date,
    day_type:d.dayType,
    custom_label:d.customLabel||null,
    notes:d.notes||null,
    morning_energy:d.morningEnergy,
    updated_at:new Date().toISOString()
  };
  var result=await db.from('days').upsert(payload,{onConflict:'user_id,date'});
  if(result.error)console.error('saveDayToDb error:',result.error);
}

async function insertBlockToDb(date,localBlock){

    user_id:authUser.id,

    end_min:localBlock.e,

    category_id:localBlock.cat,

  };

async function updateBlockInDb(localBlock){

    end_min:localBlock.e,

    energy:localBlock.energy||null,

  };

async function saveTemplateToDb(templateKey){
  if(!authUser||!data.templates[templateKey])return;
  var blocks=data.templates[templateKey];
  // Find or create the template row
  var tplRes=await db.from('templates').select('id').eq('user_id',authUser.id).eq('template_key',templateKey).maybeSingle();
  if(tplRes.error){console.error('saveTemplateToDb find error:',tplRes.error);return}
  var templateId;
  if(tplRes.data){
    templateId=tplRes.data.id;
    // Delete existing blocks
    var delRes=await db.from('template_blocks').delete().eq('template_id',templateId);
    if(delRes.error){console.error('saveTemplateToDb delete error:',delRes.error);return}
    // Update the template's updated_at
    await db.from('templates').update({updated_at:new Date().toISOString()}).eq('id',templateId);
  }else{
    // Create new template row
    var insRes=await db.from('templates').insert({user_id:authUser.id,template_key:templateKey}).select().single();
    if(insRes.error){console.error('saveTemplateToDb insert error:',insRes.error);return}
    templateId=insRes.data.id;
  }
  // Insert all blocks
  if(blocks.length>0){
    var blockRows=blocks.map(function(b,idx){return{template_id:templateId,start_min:b.s,end_min:b.e,label:b.label||null,category_id:b.cat,order_index:idx+1}});
    var blkRes=await db.from('template_blocks').insert(blockRows);
    if(blkRes.error)console.error('saveTemplateToDb blocks insert error:',blkRes.error);
  }
}

async function saveChecklistDefsToDb(){
  if(!authUser)return;
  // Wipe and rewrite all checklist_items for this user
  var delRes=await db.from('checklist_items').delete().eq('user_id',authUser.id);
  if(delRes.error){console.error('saveChecklistDefsToDb delete error:',delRes.error);return}
  if(data.checklist.length>0){
    var rows=data.checklist.map(function(c,idx){return{user_id:authUser.id,item_id:c.id,label:c.l,order_index:idx+1}});
    var insRes=await db.from('checklist_items').insert(rows);
    if(insRes.error)console.error('saveChecklistDefsToDb insert error:',insRes.error);
  }
}

async function loadDataFromDb(){
  if(!authUser)return;
  
  // Fetch all data in parallel
  var [daysRes,blocksRes,templatesRes,tmplBlocksRes,activitiesRes,checklistRes,dayChkRes]=await Promise.all([
    db.from('days').select('*'),
    db.from('blocks').select('*'),
    db.from('templates').select('*'),
    db.from('template_blocks').select('*'),
    db.from('activities').select('*').eq('is_predefined',false),
    db.from('checklist_items').select('*').order('order_index'),
    db.from('day_checklist').select('*')
  ]);
  
  // Check for errors
  var errors=[daysRes.error,blocksRes.error,templatesRes.error,tmplBlocksRes.error,activitiesRes.error,checklistRes.error,dayChkRes.error].filter(function(e){return e});
  if(errors.length){console.error('Load errors:',errors);return}
  
  // Build days object
  var days={};
  daysRes.data.forEach(function(d){
    days[d.date]={dayType:d.day_type,customLabel:d.custom_label||'',notes:d.notes||'',morningEnergy:d.morning_energy,blocks:[],checklist:{}};
  });
  
  // Attach blocks to their days
  blocksRes.data.forEach(function(b){
    if(!days[b.date])days[b.date]={dayType:null,customLabel:'',notes:'',morningEnergy:null,blocks:[],checklist:{}};
    days[b.date].blocks.push({_id:b.id,s:b.start_min,e:b.end_min,label:b.label||'',cat:b.category_id,energy:b.energy,status:b.status,note:b.note||''});
  });
  
  // Attach checklist state to days
  dayChkRes.data.forEach(function(c){
    if(days[c.date])days[c.date].checklist[c.item_id]=c.checked;
  });
  
  // Sort blocks within each day by start time
  Object.keys(days).forEach(function(d){days[d].blocks.sort(function(a,b){return a.s-b.s})});
  
  // Build templates object
  var templates={};
  templatesRes.data.forEach(function(t){
    templates[t.template_key]={_id:t.id,blocks:[]};
  });
  tmplBlocksRes.data.forEach(function(b){
    var tpl=Object.values(templates).filter(function(t){return t._id===b.template_id})[0];
    if(tpl)tpl.blocks.push({s:b.start_min,e:b.end_min,label:b.label||'',cat:b.category_id});
  });
  // Convert templates to flat block arrays (same shape as before)
  var templatesFlat={};
  Object.keys(templates).forEach(function(k){
    templates[k].blocks.sort(function(a,b){return a.s-b.s});
    templatesFlat[k]=templates[k].blocks;
  });
  
  // Build customActivities array (only active ones)
  var customActivities=activitiesRes.data.filter(function(a){return a.is_active!==false}).map(function(a){return{_id:a.id,l:a.label,cat:a.category_id,grp:a.group_name}});
  
  // Build checklist definitions array
  var checklist=checklistRes.data.map(function(c){return{id:c.item_id,l:c.label}});
  
  // Replace the global data object
  data={days:days,templates:templatesFlat,customActivities:customActivities,checklist:checklist};
}

var appInitialised=false;
var initialAuthHandled=false;

async function handleAuthState(session){
  authUser=session?session.user:null;
  // Render immediately with current state (login screen if no auth, empty if logged in)
  requestAnimationFrame(function(){
    try{R();}catch(rErr){console.error('[handleAuthState] R() threw:',rErr)}
  });
  // Then fetch data separately after letting the library settle
  if(authUser){
    setTimeout(async function(){
      try{
        await loadDataFromDb();
        console.log('[handleAuthState] Data loaded');
        requestAnimationFrame(function(){
          try{R();console.log('[handleAuthState] R() complete, body length:',$.innerHTML.length)}catch(e){console.error('[handleAuthState] R() threw:',e)}
        });
      }catch(loadErr){
        console.error('[handleAuthState] loadDataFromDb failed:',loadErr);
      }
    },200);
  }
}

db.auth.onAuthStateChange(async function(event,session){
  console.log('[onAuthStateChange] event:',event);
  // Any auth event counts as the initial signal, not just INITIAL_SESSION
  initialAuthHandled=true;
  await handleAuthState(session);
});

function startApp(){
  if(!document.getElementById('app')){
    console.warn('[startApp] #app not found, retrying');
    setTimeout(startApp,50);
    return;
  }
  console.log('[startApp] Ready');
  // Fallback: if INITIAL_SESSION never fires within 2 seconds, render login
  setTimeout(function(){
    if(!initialAuthHandled){
      console.warn('[startApp] No auth event after 2s, rendering anyway');
      handleAuthState(null);
    }
  },2000);
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',startApp);
}else{
  setTimeout(startApp,0);
}
